apiVersion: batch/v1
kind: Job
metadata:
  name: nexora-api-migrate
  annotations:
    # Sync (not PreSync) hook with wave 1 so that the SA + ESO-managed
    # nexora-api-runtime Secret land in wave 0 (default) before this
    # Job runs. Original PreSync wave 0 deadlocked: Argo refuses to
    # create the SA until the PreSync hook completes, but the Job
    # cannot create a pod without the SA — sync stuck for 11 days.
    # `Sync` semantics: the hook runs as part of the Sync phase, AFTER
    # ordinary resources in lower waves are healthy. Deployment ships
    # in wave 2 so it rolls only after migrations succeed.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexora-api-migrator
        app.kubernetes.io/part-of: nexora
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: nexora-api
      containers:
        - name: migrator
          image: ghcr.io/nexoraua/nexora-migrator:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: DOTNET_EnableDiagnostics
              value: "0"
          envFrom:
            - secretRef:
                name: nexora-api-runtime
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
