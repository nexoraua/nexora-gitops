# Dragonfly cluster — Redis-compatible cache + idempotency + refresh
# whitelist + rate limit buckets for Nexora.Api and Nexora.Admin.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: nexora-cache
  namespace: dragonfly
spec:
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.24.0
  replicas: 1                      # staging: single instance (sandbox)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  args:
    - --maxmemory=384mb
    - --proactor_threads=2
    - --snapshot_cron=0 */12 * * *   # snapshot every 12h
    - --dir=/data
  snapshot:
    cron: "0 */12 * * *"
    persistentVolumeClaimSpec:
      storageClassName: linstor-r1
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
