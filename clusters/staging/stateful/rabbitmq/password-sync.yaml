# Password-sync reconciler for the RabbitMQ admin user.
#
# Why this exists:
#   The RabbitMQ Cluster Operator reads the `default_user.conf` from the
#   Secret referenced by spec.secretBackend.externalSecret.name ONLY on
#   FIRST cluster boot. After that, users live in Mnesia — rotating the
#   password in Vault → ESO → Secret never reaches the running broker,
#   so the in-cluster Secret diverges from the actual in-DB credential
#   and consumers fail to authenticate.
#
# Strong fix: a 5-minute idempotent reconciler that reads the current
# Secret value and applies it via `rabbitmqctl change_password`.
# `change_password` is idempotent — setting the same password twice is
# a no-op, so the CronJob runs harmlessly when no rotation happened and
# converges within 5 minutes when one did.
#
# Scope: staging.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rabbitmq-password-sync
  namespace: rabbitmq
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rabbitmq-password-sync
  namespace: rabbitmq
rules:
  # Read the credential — secret name is fixed by the operator
  # contract, so we can pin resourceNames to the exact Secret.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rabbitmq-credentials"]
    verbs: ["get"]
  # Exec on the broker pod to invoke `rabbitmqctl change_password`.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rabbitmq-password-sync
  namespace: rabbitmq
subjects:
  - kind: ServiceAccount
    name: rabbitmq-password-sync
    namespace: rabbitmq
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rabbitmq-password-sync
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rabbitmq-password-sync
  namespace: rabbitmq
spec:
  # Every 5 minutes — bounded propagation delay after a Vault rotation.
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: rabbitmq-password-sync
        spec:
          serviceAccountName: rabbitmq-password-sync
          restartPolicy: Never
          # Match the broker pod's pool so the CronJob doesn't fight
          # node taints on the stateful nodepool.
          tolerations:
            - operator: Exists
          containers:
            - name: sync
              # alpine/k8s bundles kubectl + sh + base64 on Alpine. Versioned
              # tags persist (rancher/kubectl is distroless / no shell;
              # bitnami/kubectl removed numbered tags from Docker Hub in 2025).
              # 1.35.5 tracks the cluster version 1.35.x.
              image: alpine/k8s:1.35.5
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-eu", "-c"]
              args:
                - |
                  USER="$(kubectl -n rabbitmq get secret rabbitmq-credentials -o jsonpath='{.data.username}' | base64 -d)"
                  PASS="$(kubectl -n rabbitmq get secret rabbitmq-credentials -o jsonpath='{.data.password}' | base64 -d)"
                  if [ -z "$USER" ] || [ -z "$PASS" ]; then
                    echo "missing username/password in secret rabbitmq-credentials" >&2
                    exit 1
                  fi
                  echo "syncing password for user=$USER (broker pod: nexora-rabbitmq-server-0)"
                  # rabbitmqctl change_password is idempotent — repeating
                  # the same value is harmless; a true rotation converges
                  # within one tick of this CronJob.
                  kubectl -n rabbitmq exec -c rabbitmq nexora-rabbitmq-server-0 -- rabbitmqctl change_password "$USER" "$PASS"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              securityContext:
                # Compliant with PodSecurity restricted (rabbitmq ns
                # enforces baseline; satisfy restricted as well to avoid
                # admission warnings + keep future upgrades safe).
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
