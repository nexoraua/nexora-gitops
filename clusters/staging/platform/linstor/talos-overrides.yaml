# Official Piraeus Operator Talos overrides.
# Source: https://github.com/piraeusdatastore/piraeus-operator/blob/main/docs/how-to/talos.md
#
# Applies cluster-wide (no nodeSelector) so every LINSTOR satellite
# pod gets the Talos-compatible volume / initContainer set.
# Tolerations are in the per-pool configs (satellites.yaml) so they
# travel together with the nodeSelector that picks that pool.
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: talos-overrides
spec:
  podTemplate:
    spec:
      initContainers:
        - name: drbd-shutdown-guard
          $patch: delete
        - name: drbd-module-loader
          $patch: delete
      volumes:
        - name: run-systemd-system
          $patch: delete
        - name: run-drbd-shutdown-guard
          $patch: delete
        - name: systemd-bus-socket
          $patch: delete
        - name: lib-modules
          $patch: delete
        - name: usr-src
          $patch: delete
        - name: etc-lvm-backup
          hostPath:
            path: /var/etc/lvm/backup
            type: DirectoryOrCreate
        - name: etc-lvm-archive
          hostPath:
            path: /var/etc/lvm/archive
            type: DirectoryOrCreate
