          "title": "Import upstream Kubernetes Cluster Overview",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 6},
          "options": {
            "mode": "markdown",
            "content": "## Kubernetes Cluster Overview placeholder\n\nImport [grafana.com/grafana/dashboards/15757](https://grafana.com/grafana/dashboards/15757)\nand replace this JSON. Pin to the kube-prometheus-stack version that\nmatches `clusters/staging/apps/kube-prometheus-stack.yaml` targetRevision."
          }
        }
      ]
