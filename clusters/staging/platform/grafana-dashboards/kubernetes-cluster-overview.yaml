# (kube-prometheus mixin) after kube-state-metrics + node-exporter are
# scraping reliably.
#
# Upstream: https://grafana.com/grafana/dashboards/15757
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-cluster-overview.json: |
    {
      "uid": "k8s-cluster-overview-placeholder",
