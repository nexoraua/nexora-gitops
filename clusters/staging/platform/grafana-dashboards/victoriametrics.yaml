apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-victoriametrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  victoriametrics.json: |
    {
      "uid": "victoriametrics",
      "title": "VictoriaMetrics Cluster",
      "tags": ["victoriametrics", "monitoring"],
      "timezone": "browser",
      "editable": true,
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "job",
            "type": "query",
            "datasource": {"type": "prometheus"},
            "query": "label_values(vm_app_version, job)",
            "refresh": 2,
            "includeAll": true,
            "current": {"text": "All", "value": "$__all"},
            "multi": true,
            "sort": 1
          },
          {
            "name": "instance",
            "type": "query",
            "datasource": {"type": "prometheus"},
            "query": "label_values(vm_app_version{job=~\"$job\"}, instance)",
            "refresh": 2,
            "includeAll": true,
            "current": {"text": "All", "value": "$__all"},
            "multi": true,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "id": 1,
          "title": "Cluster Overview",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "id": 2,
          "title": "VMInsert Status",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
          "targets": [
            {
              "expr": "count(up{job=~\".*vminsert.*\"})",
              "legendFormat": "up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}}},
                {"type": "range", "options": {"from": 1, "to": 999, "result": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none", "textMode": "auto"}
        },
        {
          "type": "stat",
          "id": 3,
          "title": "VMSelect Status",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 1},
          "targets": [
            {
              "expr": "count(up{job=~\".*vmselect.*\"})",
              "legendFormat": "up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}}},
                {"type": "range", "options": {"from": 1, "to": 999, "result": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none", "textMode": "auto"}
        },
        {
          "type": "stat",
          "id": 4,
          "title": "VMStorage Status",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 1},
          "targets": [
            {
              "expr": "count(up{job=~\".*vmstorage.*\"})",
              "legendFormat": "up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}}},
                {"type": "range", "options": {"from": 1, "to": 999, "result": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none", "textMode": "auto"}
        },
        {
          "type": "stat",
          "id": 5,
          "title": "Total Active Timeseries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 1},
          "targets": [
            {
              "expr": "sum(vm_active_timeseries{job=~\"$job\", instance=~\"$instance\"})",
              "legendFormat": "timeseries"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "auto"}
        },
        {
          "type": "stat",
          "id": 6,
          "title": "Ingestion Rate",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 1},
          "targets": [
            {
              "expr": "sum(rate(vm_rows_inserted_total{job=~\"$job\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "rows/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "rowsps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "auto"}
        },
        {
          "type": "stat",
          "id": 7,
          "title": "Query Rate",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 1},
          "targets": [
            {
              "expr": "sum(rate(vm_http_requests_total{job=~\".*vmselect.*\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "queries/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "auto"}
        },
        {
          "type": "row",
          "id": 10,
          "title": "VMInsert",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 11,
          "title": "Rows Inserted/sec",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 6},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_rows_inserted_total{job=~\"$job\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "rowsps",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 12,
          "title": "Insert Request Rate",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 6},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_http_requests_total{job=~\".*vminsert.*\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 13,
          "title": "Insert Errors",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 6},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_http_request_errors_total{job=~\".*vminsert.*\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "color": {"mode": "fixed", "fixedColor": "red"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 14,
          "title": "Insert Latency",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 6},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, instance) (rate(vm_request_duration_seconds_bucket{job=~\".*vminsert.*\", instance=~\"$instance\"}[$__rate_interval])))",
              "legendFormat": "p50 {{instance}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, instance) (rate(vm_request_duration_seconds_bucket{job=~\".*vminsert.*\", instance=~\"$instance\"}[$__rate_interval])))",
              "legendFormat": "p95 {{instance}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, instance) (rate(vm_request_duration_seconds_bucket{job=~\".*vminsert.*\", instance=~\"$instance\"}[$__rate_interval])))",
              "legendFormat": "p99 {{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "row",
          "id": 20,
          "title": "VMSelect",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 14},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 21,
          "title": "Query Rate",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 15},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_http_requests_total{job=~\".*vmselect.*\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 22,
          "title": "Query Duration (p50/p95/p99)",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 15},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(vm_request_duration_seconds_bucket{job=~\".*vmselect.*\", instance=~\"$instance\"}[$__rate_interval])))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(vm_request_duration_seconds_bucket{job=~\".*vmselect.*\", instance=~\"$instance\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(vm_request_duration_seconds_bucket{job=~\".*vmselect.*\", instance=~\"$instance\"}[$__rate_interval])))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 23,
          "title": "Concurrent Queries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 15},
          "targets": [
            {
              "expr": "sum by (instance) (vm_concurrent_queries{job=~\".*vmselect.*\", instance=~\"$instance\"})",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 24,
          "title": "Slow Queries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 15},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_slow_queries_total{job=~\".*vmselect.*\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"},
              "color": {"mode": "fixed", "fixedColor": "orange"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "row",
          "id": 30,
          "title": "VMStorage",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 31,
          "title": "Active Timeseries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 0, "y": 24},
          "targets": [
            {
              "expr": "sum by (instance) (vm_active_timeseries{job=~\"$job\", instance=~\"$instance\"})",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 32,
          "title": "Disk Space Used",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 5, "y": 24},
          "targets": [
            {
              "expr": "sum by (instance) (vm_data_size_bytes{job=~\".*vmstorage.*\", instance=~\"$instance\"})",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 33,
          "title": "Data Points Stored",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 10, "y": 24},
          "targets": [
            {
              "expr": "sum by (instance) (vm_rows{job=~\".*vmstorage.*\", instance=~\"$instance\", type=\"storage\"})",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 34,
          "title": "Merge Operations",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 15, "y": 24},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_merges_total{job=~\".*vmstorage.*\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "stat",
          "id": 35,
          "title": "Storage Rows Total",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 4, "x": 20, "y": 24},
          "targets": [
            {
              "expr": "sum(vm_rows{job=~\".*vmstorage.*\", instance=~\"$instance\", type=\"storage\"})",
              "legendFormat": "total rows"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "auto"}
        },
        {
          "type": "row",
          "id": 40,
          "title": "VMAgent",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 32},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "id": 41,
          "title": "Scrape Targets",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 33},
          "targets": [
            {
              "expr": "count(vm_promscrape_targets_total{job=~\"$job\", instance=~\"$instance\"})",
              "legendFormat": "targets"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "none", "textMode": "auto"}
        },
        {
          "type": "timeseries",
          "id": 42,
          "title": "Samples Scraped/sec",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 4, "y": 33},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_promscrape_scraped_samples_total{job=~\"$job\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 43,
          "title": "Scrape Duration",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 9, "y": 33},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_promscrape_scrape_duration_seconds_sum{job=~\"$job\", instance=~\"$instance\"}[$__rate_interval])) / sum by (instance) (rate(vm_promscrape_scrape_duration_seconds_count{job=~\"$job\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "avg {{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 44,
          "title": "Scrape Errors",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 14, "y": 33},
          "targets": [
            {
              "expr": "sum by (instance) (rate(vm_promscrape_scrapes_failed_total{job=~\"$job\", instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"},
              "color": {"mode": "fixed", "fixedColor": "red"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "id": 45,
          "title": "Queued Samples",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 5, "x": 19, "y": 33},
          "targets": [
            {
              "expr": "sum by (instance) (vm_promscrape_push_data_queue_length{job=~\"$job\", instance=~\"$instance\"})",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "gradientMode": "scheme", "showPoints": "never"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "row",
          "id": 50,
          "title": "Resource Usage",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 41},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 51,
          "title": "CPU Usage - VMInsert",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 42},
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{pod=~\".*vminsert.*\", container!=\"\"}[$__rate_interval]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
