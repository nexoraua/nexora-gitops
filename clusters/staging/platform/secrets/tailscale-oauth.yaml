# Tailscale auth key for the standalone subnet router.
# Seed before the tailscale Application syncs:
#
#   vault kv put kv/nexora/staging/tailscale \
#     auth-key="tskey-auth-..."
#
# Generated at https://login.tailscale.com/admin/settings/keys with:
#   reusable: yes, ephemeral: no, pre-authorized: yes, tags: tag:k8s
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: tailscale-auth
    creationPolicy: Owner
  data:
    - secretKey: auth-key
      remoteRef:
        key: nexora/staging/tailscale
        property: auth-key
