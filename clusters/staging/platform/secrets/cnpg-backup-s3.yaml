# S3 credentials for CloudNativePG backups of the staging business
# cluster. Target: Hetzner Object Storage bucket
# nexora-cnpg-backups-staging (FSN1, fsn1.your-objectstorage.com).
# Source: Vault KV at kv/nexora/staging/cnpg/backup-s3.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/staging/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/staging/cnpg/backup-s3
        property: secret-access-key
---
# Same Hetzner Object Storage credentials, materialized into the
# authentik namespace for the authentik CNPG cluster's backups
# (bucket nexora-cnpg-backups-authentik-staging). Hetzner Object
# Storage keys are project-scoped, so the same key reaches both
# backup buckets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/staging/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/staging/cnpg/backup-s3
        property: secret-access-key
