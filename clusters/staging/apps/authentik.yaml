# Authentik central IdP — OIDC for admin app, ArgoCD, Grafana, vmui,
# RabbitMQ Management. Upstream OIDC source: Google Workspace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: apps
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2024.10.5
    helm:
      values: |
        global:
          envFrom:
            - secretRef:
                name: authentik-bootstrap
        # Native blueprint loader (ROOT-level chart value, NOT under
        # `authentik:` block — that block is reserved for AUTHENTIK_*
        # env vars). Chart auto-mounts these ConfigMaps at
        # /blueprints/mounted/cm-<name>/ on both server and worker;
        # Authentik scans /blueprints/ recursively and applies any YAML
        # with blueprints.goauthentik.io/instantiate=true.
        #
        # Staging mirrors develop's argocd + grafana RBAC scaffolding
        # — see clusters/staging/platform/authentik/blueprints/. Member
        # lists are empty until operator enrolls via Google-OIDC on
        # auth.staging.nxua.dev; Terraform-managed argocd/grafana RBAC
        # keep wildcard-admin defaults so no lock-out occurs in the
        # interim.
        blueprints:
          configMaps:
            - authentik-blueprint-argocd-rbac
            - authentik-blueprint-argocd-oidc
            - authentik-blueprint-grafana-rbac
            - authentik-blueprint-grafana-oidc
        authentik:
          error_reporting:
            enabled: false
          postgresql:
            host: nexora-authentik-staging-rw.authentik.svc
            name: authentik
            user: authentik
            # Password is injected via envFrom from the
            # authentik-bootstrap Secret (key
            # AUTHENTIK_POSTGRESQL__PASSWORD). Setting this field here
            # would make Helm template the literal `${VAR}` into the
            # chart's authentik Secret, which Authentik then takes as
            # the password verbatim.
          redis:
            host: nexora-cache.dragonfly.svc.cluster.local
        server:
          replicas: 1
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - auth.staging.nxua.dev
            tls:
              - secretName: authentik-tls
                hosts:
                  - auth.staging.nxua.dev
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              memory: 768Mi
        worker:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        postgresql:
          enabled: false   # provided by CloudNativePG (clusters/staging/stateful/authentik/)
        redis:
          enabled: false   # provided by Dragonfly (apps/dragonfly-cache.yaml)
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
