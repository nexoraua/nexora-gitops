# Loki — log aggregation backend. On staging we run SingleBinary mode
# with filesystem storage on a LINSTOR PVC. Retention is 7 days (vs 30
# on production); the schemaConfig keeps a future migration to S3
# (Hetzner Object Storage) backward-compatible.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.20.0
    helm:
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          pattern_ingester:
            enabled: false
          ruler:
            enable_api: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 168h     # 7 days on staging
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: linstor-r1
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        # SimpleScalable replicas must be 0 in SingleBinary mode — the
        # chart validates that you don't run both topologies at once.
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        gateway:
          enabled: true
          replicas: 1
        chunksCache:
          enabled: false       # staging sandbox — keep memory budget tight
        resultsCache:
          enabled: false
        test:
          enabled: false
        # No ingester/distributor in SingleBinary; the chart still
        # instantiates the deployments by default with 0 replicas, but
        # explicit makes it readable.
        ingester:
          replicas: 0
        distributor:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        indexGateway:
          replicas: 0
        compactor:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
