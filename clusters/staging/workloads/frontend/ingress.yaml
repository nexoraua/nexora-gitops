apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexora-frontend
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`staging.nexora.in.ua`) && PathPrefix(`/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: secure-headers
      services:
        - name: nexora-frontend
          port: 80
  tls:
    secretName: nexora-frontend-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nexora-frontend-tls
spec:
  secretName: nexora-frontend-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: staging.nexora.in.ua
  dnsNames:
    - staging.nexora.in.ua
  duration: 2160h
  renewBefore: 360h
