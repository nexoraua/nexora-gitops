# ArgoCD AppProjects — namespace/source isolation for develop cluster.
# Root app stays in 'default' project (manages Application CRDs in argocd ns).
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Infrastructure, operators, and cross-cutting platform resources
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
    - https://bitnami-labs.github.io/sealed-secrets
    - https://charts.jetstack.io
    - https://traefik.github.io/charts
    - https://cloudnative-pg.github.io/charts
    - https://github.com/dragonflydb/dragonfly-operator.git
    - https://charts.external-secrets.io
    - https://helm.releases.hashicorp.com
    - https://linkerd.github.io/linkerd2
    - https://argoproj.github.io/argo-helm
    - https://charts.hetzner.cloud
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data
  namespace: argocd
spec:
  description: Stateful workload clusters managed by operators
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: postgresql
    - server: https://kubernetes.default.svc
      namespace: rabbitmq
    - server: https://kubernetes.default.svc
      namespace: dragonfly
    - server: https://kubernetes.default.svc
      namespace: authentik
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: VictoriaMetrics, Grafana, Loki, Tempo, Alloy, kube-prometheus-stack
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
    - https://victoriametrics.github.io/helm-charts
    - https://grafana.github.io/helm-charts
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: kube-system
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: Authentik (central IdP), Vault, Nexora services
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
    - https://charts.goauthentik.io
    - https://helm.releases.hashicorp.com
  destinations:
    - server: https://kubernetes.default.svc
      namespace: authentik
    - server: https://kubernetes.default.svc
      namespace: vault-system
    - server: https://kubernetes.default.svc
      namespace: nexora-api
    - server: https://kubernetes.default.svc
      namespace: nexora-admin
    # Vault bootstrap manifests include a Traefik Middleware (Cloudflare
    # Access JWT assertion) that lives in the traefik ns, and a cluster-
    # scoped ClusterSecretStore for ESO->Vault.
    - server: https://kubernetes.default.svc
      namespace: traefik
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: external-secrets.io
      kind: ClusterSecretStore
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
