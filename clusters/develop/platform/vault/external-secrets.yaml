# ClusterSecretStore pointing at Vault KV (after Vault is unsealed).
# Used to materialize secrets that other workloads need as Kubernetes
# Secret resources.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: http://vault.vault-system.svc:8200
      path: kv
      version: v2
      # In-cluster TLS is disabled on develop; in-cluster traffic is
      # encrypted by Cilium transparent encryption (node-to-node).
      # Production will re-enable Vault TLS and add caProvider here.
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
# NOTE: the vault-oidc-client ExternalSecret + oidc-bootstrap Job were
# moved to _pending-authentik-oidc/ — they depend on an Authentik OIDC
# provider for Vault, which is not yet bootstrapped. Re-introduce them
# (and the kv/nexora/develop/vault-oidc KV path) when the Authentik
# OIDC integration is set up. See README.md.
