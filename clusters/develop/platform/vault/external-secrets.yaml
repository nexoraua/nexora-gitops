# ClusterSecretStore pointing at Vault KV (after Vault is unsealed).
# Used to materialize secrets that other workloads need as Kubernetes
# Secret resources.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: http://vault.vault-system.svc:8200
      path: kv
      version: v2
      # In-cluster TLS is disabled on develop (Linkerd mTLS provides
      # confidentiality). Production will re-enable Vault TLS and add
      # caProvider here.
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# OIDC client credentials for the Vault → Authentik integration.
# Authentik provider is created via Authentik blueprint; the resulting
# client_id/client_secret are written to Vault KV path
# kv/nexora/develop/vault-oidc by an ops runbook step, then ESO mirrors
# them here for the bootstrap Job to consume.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-oidc-client
  namespace: vault-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: vault-oidc-client
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: nexora/develop/vault-oidc
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: nexora/develop/vault-oidc
        property: client_secret
