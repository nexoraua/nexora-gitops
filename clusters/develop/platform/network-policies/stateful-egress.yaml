---
# Peer egress for postgres pods (CNPG replication, streaming, etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-peer
  namespace: postgresql
spec:
  podSelector:
    matchLabels:
      cnpg.io/podRole: instance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    # CNPG operator + monitoring need to scrape /metrics on 9187.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9187
          protocol: TCP
        - port: 8000
          protocol: TCP
    # App namespaces talking to the business cluster on 5432.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
---
# RabbitMQ Cluster Operator manages pods on port 15672 / 5672 / 4369 /
# 25672 etc. Allow peer + monitoring + app traffic on those.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-peer
  namespace: rabbitmq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nexora-rabbitmq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nexora-rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 4369
          protocol: TCP
        - port: 25672
          protocol: TCP
        - port: 15672
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rabbitmq-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 15672
          protocol: TCP
        - port: 15692
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 5672
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nexora-rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 4369
          protocol: TCP
        - port: 25672
          protocol: TCP
        - port: 15672
          protocol: TCP
---
# CNPG pods need egress to Hetzner Object Storage (FSN1). This must
# cover not just running instances (WAL archiving + base backups) but
# also the bootstrap/recovery and backup Job pods — a restore reads
# the base backup + WAL from the bucket, and those Job pods carry
# cnpg.io/jobRole, NOT cnpg.io/podRole=instance. Selecting on the
# cnpg.io/cluster label (present on every CNPG-managed pod) covers
# all of them; without it a restore fails with "Could not connect to
# the endpoint URL". Scoped to the object-storage FQDN via Cilium
# toFQDNs so only that endpoint is reachable — not the wider internet.
# The DNS rule carries `rules.dns` so Cilium's DNS proxy can learn the
# FQDN -> IP mapping that toFQDNs depends on.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-object-storage
  namespace: postgresql
spec:
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "fsn1.your-objectstorage.com"
        - matchPattern: "*.fsn1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
