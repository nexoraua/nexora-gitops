# Allow rules to make Vault actually work behind default-deny.
# Without these, vault listens on 8200 but no traffic ever reaches it.
---
# 1. Intra-cluster raft + API traffic between vault pods (8200, 8201).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-peer
  namespace: vault-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - port: 8200
          protocol: TCP
        - port: 8201
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - port: 8200
          protocol: TCP
        - port: 8201
          protocol: TCP
---
# 2. API access from External Secrets, ArgoCD, observability, app namespaces.
# Authentik talks to Vault for OIDC client secret retrieval; ESO mounts
# Vault as backend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-api-ingress
  namespace: vault-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8200
          protocol: TCP
---
# 3. Egress: DNS + Traefik. apiserver egress is handled by the
# CiliumNetworkPolicy below (toEntities kube-apiserver), because the
# apiserver pod uses hostNetwork and Cilium's standard NetworkPolicy
# ipBlock does not match host-identity traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-egress-dns
  namespace: vault-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Vault reaches Authentik for OIDC discovery via the public
    # hostname auth.develop.nxua.dev, which CoreDNS split-horizon
    # resolves to the Traefik ClusterIP. Cilium DNATs the ClusterIP
    # to the Traefik pod, whose websecure container port is 8443
    # (the Service's 443 -> targetPort websecure). The NetworkPolicy
    # port must be the post-DNAT pod port, so allow 8443.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8443
          protocol: TCP
---
# 4. Egress to kube-apiserver (Cilium-specific). Cilium maps the
# apiserver to a reserved entity which is the only reliable selector
# when the apiserver runs in hostNetwork (its endpoint is a node IP,
# not a pod IP — so standard NetworkPolicy ipBlock won't match it).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-egress-apiserver
  namespace: vault-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
