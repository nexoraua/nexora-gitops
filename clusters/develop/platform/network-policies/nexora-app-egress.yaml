# S14 Wave 1.9 — default-deny + explicit egress allowlist for
# nexora-api and nexora-admin.
#
# These two namespaces touch customer money, so locking down lateral
# movement + exfiltration surface is launch-relevant. Allowlist
# specifically covers:
#   - kube-dns (so service names resolve)
#   - kube-apiserver (probes + init)
#   - postgresql/cnpg business cluster on 5432
#   - vault-system on 8200 (Transit KMS)
#   - authentik on 9000 (OIDC discovery + token introspection)
#   - monitoring/alloy on 4317 (OTLP)
#   - external ComplyAdvantage AML provider via toFQDNs
#
# Ingress allowlist:
#   - traefik namespace (HTTP traffic from public ingress)
#   - monitoring (Prometheus / VMAgent scrape if it ever turns on)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# DNS — both namespaces, k8s NP form so Cilium honours it identically.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# kube-apiserver — needed for migration init pods + service-account
# token refresh.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: nexora-api
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: nexora-admin
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# Egress to CNPG business DB (5432), Vault (8200), Authentik (9000),
# Alloy OTLP (4317), and ComplyAdvantage public AML provider.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-platform
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
      ports:
        - port: 8200
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-platform
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
      ports:
        - port: 8200
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# External AML provider — admin host calls ComplyAdvantage on KYC
# review. API host MAY also call it post-Wave 3 user-side KYC submit.
# Allow both. Cluster-default in develop is set to WarnOnly so the
# fake provider is wired anyway, but the egress rule still belongs
# here for production promotion.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-aml-provider
  namespace: nexora-api
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "api.complyadvantage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-aml-provider
  namespace: nexora-admin
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "api.complyadvantage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Ingress: Traefik (public traffic) + monitoring (scrape).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-traefik
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-traefik
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
