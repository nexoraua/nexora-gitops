# S14 Wave 1.9 — explicit egress allowlist for nexora-api and
# nexora-admin (default-deny REMOVED after hotfix — see header below).
#
# HOTFIX 2026-06-18: the initial default-deny version of this file
# broke admin OIDC discovery — the Authentik Authority URL
# `https://auth.develop.nxua.dev/...` is a public Cloudflare-fronted
# endpoint, NOT the internal `authentik:9000` Service. With default-
# deny + no `toFQDNs` rule for auth.develop.nxua.dev the OIDC handler
# timed out at 60s, ExceptionHandlerMiddleware fired, redirect
# middleware tried to send the user back to /auth/login → infinite
# loop → 405 at the edge. Pulling the default-deny stanzas restores
# the running posture; the explicit allowlist below stays as
# documentation + belt-and-braces.
#
# To re-introduce default-deny safely we need to:
#   1. Add Cilium CNP with `toFQDNs: auth.develop.nxua.dev`
#   2. Add Cilium CNP with `toFQDNs: api.complyadvantage.com`
#   3. Add ALL outgoing FQDNs the app reaches (Vault if public,
#      object-storage for DSR exports, etc.)
#   4. Test on a single pod via `cilium policy trace` before applying.
#
# Until that's done, this file is permissive-by-default; the explicit
# allowlists below add NOTHING when there is no deny baseline. Kept
# for future re-enablement.
---
# DNS — both namespaces, k8s NP form so Cilium honours it identically.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# kube-apiserver — needed for migration init pods + service-account
# token refresh.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: nexora-api
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: nexora-admin
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# Egress to CNPG business DB (5432), Vault (8200), Authentik (9000),
# Alloy OTLP (4317), and ComplyAdvantage public AML provider.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-platform
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
      ports:
        - port: 8200
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-platform
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
      ports:
        - port: 8200
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# External AML provider — admin host calls ComplyAdvantage on KYC
# review. API host MAY also call it post-Wave 3 user-side KYC submit.
# Allow both. Cluster-default in develop is set to WarnOnly so the
# fake provider is wired anyway, but the egress rule still belongs
# here for production promotion.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-aml-provider
  namespace: nexora-api
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "api.complyadvantage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-aml-provider
  namespace: nexora-admin
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "api.complyadvantage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Ingress: Traefik (public traffic) + monitoring (scrape).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-traefik
  namespace: nexora-api
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-traefik
  namespace: nexora-admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
