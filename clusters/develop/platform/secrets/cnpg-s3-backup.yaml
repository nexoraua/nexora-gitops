# Hetzner Object Storage credentials for CNPG WAL / base backups.
# Bucket: nexora-develop-cnpg-backups; endpoint: fsn1.your-objectstorage.com.
# Subpaths per cluster (business/, authentik/) configured in the Cluster CR.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-business-s3-backup
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-business-s3-backup
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/develop/object-storage/cnpg-backups
        property: access_key_id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/develop/object-storage/cnpg-backups
        property: secret_access_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-authentik-s3-backup
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-authentik-s3-backup
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/develop/object-storage/cnpg-backups
        property: access_key_id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/develop/object-storage/cnpg-backups
        property: secret_access_key
