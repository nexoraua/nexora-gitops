# ArgoCD OIDC client credentials — Authentik provider "argocd".
# Merged into the existing argocd-secret (created by the ArgoCD Helm
# release) so ArgoCD's oidc.config $-references resolve. ESO
# creationPolicy=Merge adds the two keys without owning the Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    # Without an explicit template ESO copies this ExternalSecret's own
    # labels/annotations onto argocd-secret — including ArgoCD's
    # tracking-id — so ArgoCD then treats argocd-secret as an untracked
    # extra resource of the bootstrap-secrets app. An empty template
    # stops that propagation; the OIDC data keys are still merged in.
    template:
      metadata: {}
  data:
    - secretKey: oidc.authentik.clientID
      remoteRef:
        key: nexora/develop/oidc/argocd
        property: client_id
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: nexora/develop/oidc/argocd
        property: client_secret
