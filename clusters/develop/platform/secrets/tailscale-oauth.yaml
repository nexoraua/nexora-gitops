# Tailscale OAuth client credentials for the operator.
# Seed before the tailscale-operator Application syncs:
#
#   vault kv put kv/nexora/develop/tailscale-oauth \
#     client_id="<from Tailscale admin → Settings → OAuth clients>" \
#     client_secret="<same>"
#
# ESO materializes a Kubernetes Secret named "operator-oauth" in the
# tailscale namespace. The Helm chart looks it up by that name.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: nexora/develop/tailscale-oauth
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: nexora/develop/tailscale-oauth
        property: client_secret
