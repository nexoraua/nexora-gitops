# Alertmanager config — Telegram receiver for the develop tail of alerts.
#
# Source: Vault KV at kv/nexora/develop/alerts/telegram, materialised by
# ESO into the alertmanager-config Secret consumed by the vmalertmanager
# spec (configSecret: alertmanager-config in apps/victoria-metrics.yaml).
#
# Vault layout:
#   kv/nexora/develop/alerts/telegram
#     bot_token = <BotFather token>
#     chat_id   = -1003724666926   (supergroup "NEXORA development")
#     topic_id  = 40               (forum topic for develop alerts)
#
# Routes:
#   * Watchdog alert is dropped — it is an always-firing heartbeat used
#     by external dead-man-switch monitors, not a notification.
#   * severity=info dropped on develop to keep the channel readable. On
#     staging/production keep the same route shape but re-evaluate.
#   * everything else fans into the single telegram receiver, which
#     posts to the develop topic with HTML formatting + send_resolved.
#
# Cluster label: vmalert is configured with externalLabels.cluster=develop
# in apps/victoria-metrics.yaml so every alert arrives at Alertmanager
# carrying `cluster=develop` and the message header renders correctly even
# if individual metrics do not export the label themselves.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m

          route:
            receiver: telegram
            group_by: ['alertname', 'cluster', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - matchers:
                  - alertname = "Watchdog"
                receiver: 'null'
              - matchers:
                  - severity = "info"
                receiver: 'null'

          receivers:
            - name: 'null'
            - name: telegram
              telegram_configs:
                - bot_token: '{{ .bot_token }}'
                  chat_id: {{ .chat_id }}
                  message_thread_id: {{ .topic_id }}
                  api_url: https://api.telegram.org
                  parse_mode: HTML
                  send_resolved: true
                  # NOTE: Alertmanager templates use Go text/template with
                  # Prometheus' helpers only — sprig is NOT available, so
                  # `default` and similar filters silently fail and yield
                  # an empty message body (Telegram then rejects the
                  # delivery with "Bad Request: message text is empty").
                  # Keep the template to plain `if`/`range` and direct
                  # field access.
                  message: |-
                    {{ "{{" }} if eq .Status "firing" {{ "}}" }}🔴 <b>[FIRING:{{ "{{" }} .Alerts.Firing | len {{ "}}" }}]</b>{{ "{{" }} else {{ "}}" }}✅ <b>[RESOLVED]</b>{{ "{{" }} end {{ "}}" }} {{ "{{" }} .CommonLabels.alertname {{ "}}" }}

                    <b>cluster:</b> {{ "{{" }} if .CommonLabels.cluster {{ "}}" }}{{ "{{" }} .CommonLabels.cluster {{ "}}" }}{{ "{{" }} else {{ "}}" }}develop{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} if .CommonLabels.namespace {{ "}}" }}<b>ns:</b> {{ "{{" }} .CommonLabels.namespace {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .CommonLabels.severity {{ "}}" }}<b>severity:</b> {{ "{{" }} .CommonLabels.severity {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} range .Alerts -{{ "}}" }}
                    • {{ "{{" }} if .Annotations.summary {{ "}}" }}{{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} else if .Annotations.description {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} else {{ "}}" }}(no summary){{ "{{" }} end {{ "}}" }}{{ "{{" }} if .GeneratorURL {{ "}}" }} <a href="{{ "{{" }} .GeneratorURL {{ "}}" }}">graph</a>{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
  data:
    - secretKey: bot_token
      remoteRef:
        key: nexora/develop/alerts/telegram
        property: bot_token
    - secretKey: chat_id
      remoteRef:
        key: nexora/develop/alerts/telegram
        property: chat_id
    - secretKey: topic_id
      remoteRef:
        key: nexora/develop/alerts/telegram
        property: topic_id
