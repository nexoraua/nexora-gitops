# Hetzner Object Storage credentials for Tempo trace blocks.
# Bucket: nexora-develop-tempo.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tempo-s3
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: tempo-s3
    creationPolicy: Owner
  data:
    - secretKey: TEMPO_S3_ACCESS_KEY
      remoteRef:
        key: nexora/develop/object-storage/tempo
        property: access_key_id
    - secretKey: TEMPO_S3_SECRET_KEY
      remoteRef:
        key: nexora/develop/object-storage/tempo
        property: secret_access_key
