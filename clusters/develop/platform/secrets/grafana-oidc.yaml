# Grafana OIDC client credentials — Authentik provider "grafana".
# client_id / client_secret are materialised as files under
# /etc/grafana/secrets (see apps/grafana.yaml extraSecretMounts) and
# referenced from grafana.ini via $__file{}.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-id
      remoteRef:
        key: nexora/develop/oidc/grafana
        property: client_id
    - secretKey: oidc-client-secret
      remoteRef:
        key: nexora/develop/oidc/grafana
        property: client_secret
