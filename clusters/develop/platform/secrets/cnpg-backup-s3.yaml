# S3 credentials for CloudNativePG backups of the develop business
# cluster. Target: Hetzner Object Storage bucket
# nexora-cnpg-backups-develop (FSN1, fsn1.your-objectstorage.com).
# Source: Vault KV at kv/nexora/develop/cnpg/backup-s3.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/develop/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/develop/cnpg/backup-s3
        property: secret-access-key
