# S3 credentials for CloudNativePG backups of the develop business
# cluster. The target bucket is AWS S3 (nexora-cnpg-backups-develop,
# eu-central-1) — deliberately a different provider than the Hetzner
# cluster so a Hetzner-wide outage cannot take the backups with it.
# Source: Vault KV at kv/nexora/develop/cnpg/backup-s3.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/develop/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/develop/cnpg/backup-s3
        property: secret-access-key
