# Google OAuth Client ID + Secret для Authentik Google source.
# Materializes from Vault into a Secret consumed by the Authentik
# server + worker pods via global.envFrom (see apps/authentik.yaml).
# The Google OAuth blueprint (platform/authentik/blueprints/google-oauth.yaml)
# references these via !Env tags at blueprint-apply time.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-google-oauth
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: authentik-google-oauth
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_OAUTH_CLIENT_ID
      remoteRef:
        key: nexora/develop/authentik/google-oauth
        property: client_id
    - secretKey: GOOGLE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: nexora/develop/authentik/google-oauth
        property: client_secret
