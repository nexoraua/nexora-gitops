# Hetzner Object Storage credentials for Loki chunks/ruler/admin.
# Bucket: nexora-develop-loki.
# Loki Helm chart consumes these as env vars via extraEnvFrom on the
# Loki deployment (configure via values once secret exists, then enable
# `LOKI_S3_ACCESS_KEY` and `LOKI_S3_SECRET_KEY` interpolation in
# apps/loki.yaml).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: loki-s3
    creationPolicy: Owner
  data:
    - secretKey: LOKI_S3_ACCESS_KEY
      remoteRef:
        key: nexora/develop/object-storage/loki
        property: access_key_id
    - secretKey: LOKI_S3_SECRET_KEY
      remoteRef:
        key: nexora/develop/object-storage/loki
        property: secret_access_key
