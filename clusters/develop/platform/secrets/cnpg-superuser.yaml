# Materialises the superuser password for both CNPG clusters.
# Source: Vault KV at kv/nexora/develop/cnpg/superuser (single password
# shared by both develop clusters; production splits them).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-superuser
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/develop/cnpg/superuser
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/develop/cnpg/superuser
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-authentik-superuser
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-authentik-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/develop/cnpg/authentik-superuser
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/develop/cnpg/authentik-superuser
        property: password
---
# Authentik schema owner credentials used by the CNPG bootstrap initdb.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-postgres-credentials
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: authentik-postgres-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/develop/authentik/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/develop/authentik/postgres
        property: password
