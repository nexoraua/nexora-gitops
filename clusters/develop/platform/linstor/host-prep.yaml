# Talos has no systemd, so /run/systemd/system never exists. The
# upstream Piraeus satellite DaemonSet hard-mounts that hostPath with
# type=Directory, which makes kubelet fail volume setup and block all
# init containers. Create the directory on every node via a tiny
# DaemonSet so the satellite's volume mount succeeds.
#
# The DaemonSet runs an initContainer that does the mkdir, then a
# pause container that just keeps the pod alive — kubelet would
# otherwise restart the init container on a CrashLoop.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: talos-run-systemd-mkdir
  namespace: piraeus-datastore
  labels:
    app.kubernetes.io/name: talos-run-systemd-mkdir
    app.kubernetes.io/managed-by: nexora-gitops
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: talos-run-systemd-mkdir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: talos-run-systemd-mkdir
    spec:
      hostPID: false
      restartPolicy: Always
      tolerations:
        - operator: Exists
      initContainers:
        - name: mkdir
          image: busybox:1.37
          command: ["sh", "-c", "mkdir -p /host-run/systemd/system && echo created"]
          volumeMounts:
            - name: host-run
              mountPath: /host-run
          securityContext:
            runAsUser: 0
            privileged: true
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              memory: 16Mi
      volumes:
        - name: host-run
          hostPath:
            path: /run
            type: Directory
