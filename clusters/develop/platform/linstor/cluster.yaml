# LinstorCluster — declares the LINSTOR controller + CSI deployments.
# Per-node satellite placement is controlled by LinstorSatelliteConfiguration
# (satellites.yaml) — that's where nodepool selectors + tolerations live.
apiVersion: piraeus.io/v1
kind: LinstorCluster
metadata:
  name: linstorcluster
spec:
  # Pin the LINSTOR controller to the system nodepool.
  controller:
    podTemplate:
      spec:
        nodeSelector:
          nodepool: system
        tolerations:
          - key: nodepool
            operator: Equal
            value: system
            effect: NoSchedule
  csiController:
    podTemplate:
      spec:
        nodeSelector:
          nodepool: system
        tolerations:
          - key: nodepool
            operator: Equal
            value: system
            effect: NoSchedule
  # CSI node-plugin DaemonSet runs on every worker that may host a
  # PVC consumer (system, workers, database).
  csiNode:
    podTemplate:
      spec:
        tolerations:
          - key: nodepool
            operator: Equal
            value: system
            effect: NoSchedule
          - key: nodepool
            operator: Equal
            value: database
            effect: NoSchedule
