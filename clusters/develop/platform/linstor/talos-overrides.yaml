# Official Piraeus Operator Talos overrides.
# Source: https://github.com/piraeusdatastore/piraeus-operator/blob/main/docs/how-to/talos.md
#
# Applies cluster-wide (no nodeSelector) so every LINSTOR satellite
# pod gets:
#   - Talos-compatible volume/initContainer set
#   - tolerations for both system + database nodepool taints, so the
#     satellite DaemonSet lands on stateful-1 and system-1 as well as
#     the (untainted) workers pool
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: talos-overrides
spec:
  podTemplate:
    spec:
      tolerations:
        - key: nodepool
          operator: Equal
          value: system
          effect: NoSchedule
        - key: nodepool
          operator: Equal
          value: database
          effect: NoSchedule
      initContainers:
        - name: drbd-shutdown-guard
          $patch: delete
        - name: drbd-module-loader
          $patch: delete
      volumes:
        - name: run-systemd-system
          $patch: delete
        - name: run-drbd-shutdown-guard
          $patch: delete
        - name: systemd-bus-socket
          $patch: delete
        - name: lib-modules
          $patch: delete
        - name: usr-src
          $patch: delete
        - name: etc-lvm-backup
          hostPath:
            path: /var/etc/lvm/backup
            type: DirectoryOrCreate
        - name: etc-lvm-archive
          hostPath:
            path: /var/etc/lvm/archive
            type: DirectoryOrCreate
