# Talos-specific patches to the LINSTOR satellite DaemonSet.
#
# 1. /run/systemd/system: Talos has no systemd. We pre-create that
#    directory via the talos-run-systemd-mkdir DaemonSet (host-prep.yaml)
#    so the satellite's hostPath.type=Directory mount succeeds.
#
# 2. AppArmor: Talos's default container profile blocks CAP_SYS_MODULE
#    on the init containers. Annotate every container to run AppArmor
#    unconfined.
#
# 3. drbd-module-loader: removed. The DRBD kernel module is auto-loaded
#    at Talos boot through machineconfig (machine.kernel.modules), so
#    the loader is not needed. Keeping it would also fail because its
#    seLinuxOptions.type=spc_t is not defined in Talos's SELinux policy
#    (runc: "unable to apply caps: operation not permitted").
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: talos-overrides
spec:
  podTemplate:
    metadata:
      annotations:
        container.apparmor.security.beta.kubernetes.io/drbd-shutdown-guard: unconfined
        container.apparmor.security.beta.kubernetes.io/setup-lvm-configuration: unconfined
        container.apparmor.security.beta.kubernetes.io/linstor-satellite: unconfined
        container.apparmor.security.beta.kubernetes.io/drbd-reactor: unconfined
  patches:
    - target:
        kind: DaemonSet
        name: linstor-satellite
      patch: |
        - op: remove
          path: /spec/template/spec/initContainers/0
