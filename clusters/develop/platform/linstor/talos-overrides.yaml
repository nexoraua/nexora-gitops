# Official Piraeus Operator Talos overrides.
# Source: https://github.com/piraeusdatastore/piraeus-operator/blob/main/docs/how-to/talos.md
#
# Talos:
#   - /etc is read-only → /etc/lvm/{archive,backup} must be relocated
#     to /var/etc/lvm/{archive,backup}
#   - no systemd → drbd-shutdown-guard + its volumes are unusable
#   - DRBD module is provided by the Talos `siderolabs/drbd` system
#     extension and loaded at boot via machine.kernel.modules — the
#     drbd-module-loader init container is unnecessary
#   - kernel header / src trees aren't present (immutable image), so
#     lib-modules + usr-src volume mounts are pointless
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: talos-overrides
spec:
  podTemplate:
    spec:
      initContainers:
        - name: drbd-shutdown-guard
          $patch: delete
        - name: drbd-module-loader
          $patch: delete
      volumes:
        - name: run-systemd-system
          $patch: delete
        - name: run-drbd-shutdown-guard
          $patch: delete
        - name: systemd-bus-socket
          $patch: delete
        - name: lib-modules
          $patch: delete
        - name: usr-src
          $patch: delete
        - name: etc-lvm-backup
          hostPath:
            path: /var/etc/lvm/backup
            type: DirectoryOrCreate
        - name: etc-lvm-archive
          hostPath:
            path: /var/etc/lvm/archive
            type: DirectoryOrCreate
