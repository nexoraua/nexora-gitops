# Per-nodepool LinstorSatelliteConfiguration — defines storage pools.
# Tolerations + Talos overrides are in talos-overrides.yaml (applies
# cluster-wide), so this file is just about which nodes get a pool
# and what kind.
---
# workers (cx33, ~74 GB ephemeral)
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: pool-workers
spec:
  nodeSelector:
    nodepool: workers
  storagePools:
    - name: pool0
      fileThinPool:
        directory: /var/lib/piraeus-datastore
---
# system pool (cx33, ~74 GB)
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: pool-system
spec:
  nodeSelector:
    nodepool: system
  storagePools:
    - name: pool0
      fileThinPool:
        directory: /var/lib/piraeus-datastore
---
# stateful pool (cx43, ~93 GB)
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: pool-stateful
spec:
  nodeSelector:
    nodepool: database
  storagePools:
    - name: pool0
      fileThinPool:
        directory: /var/lib/piraeus-datastore
