# Authentik blueprint — registers Vault as an OAuth2/OIDC client.
# Applied automatically by Authentik when discovered in /blueprints
# (mounted from this ConfigMap). After Apply, the generated client_id
# and client_secret must be copied into Vault KV at
# kv/nexora/develop/vault-oidc so the Vault OIDC bootstrap Job
# (platform/vault/oidc-bootstrap.yaml) can wire the trust both ways.
#
# Note: this file lives inside a ConfigMap mounted at /blueprints in the
# Authentik server pod (see clusters/develop/platform/authentik/ for the
# kustomization).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-vault
  namespace: authentik
  labels:
    app.kubernetes.io/instance: authentik
data:
  vault.yaml: |
    version: 1
    metadata:
      name: vault
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.application
        identifiers:
          slug: vault
        attrs:
          name: HashiCorp Vault
          slug: vault
          provider: !KeyOf vault-oidc
          meta_launch_url: https://vault.develop.nxua.dev/ui
          policy_engine_mode: any
          group: Infrastructure

      - model: authentik_providers_oauth2.oauth2provider
        id: vault-oidc
        identifiers:
          name: vault-oidc
        attrs:
          name: vault-oidc
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_type: confidential
          client_id: "{{ vault_client_id | default('generate-on-first-apply') }}"
          # client_secret is auto-generated by Authentik; copy it from the
          # Authentik admin UI (Providers -> vault-oidc) into Vault KV at
          # kv/nexora/develop/vault-oidc after the first apply.
          access_code_validity: minutes=1
          access_token_validity: minutes=10
          refresh_token_validity: days=30
          include_claims_in_id_token: true
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          redirect_uris: |-
            https://vault.develop.nxua.dev/ui/vault/auth/oidc/oidc/callback
            https://vault.develop.nxua.dev/oidc/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
