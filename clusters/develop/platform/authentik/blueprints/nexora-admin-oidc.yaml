# Authentik blueprint — registers Nexora Admin (`admin.develop.nxua.dev`)
# as an OAuth2/OIDC client of Authentik. Pattern mirrors vault.yaml:
# Authentik generates the client_secret on first apply; an operator
# copies it from the Authentik UI into Vault KV at
# kv/nexora/develop/oidc/nexora-admin so the admin app's ExternalSecret
# can wire it as Auth__Authentik__ClientSecret.
#
# client_id is FIXED to "nexora-admin" via the identifier below
# (instead of letting Authentik auto-generate). This is the strong
# pattern: the public client_id never changes between rebuilds, so
# the admin app's ConfigMap can embed it as a known constant — only
# the rotating client_secret stays in Vault. (Compare vault.yaml which
# auto-generates client_id and requires manual sync of BOTH values.)
#
# Used by:
#   - nexora-admin app for OIDC Code flow at https://admin.develop.nxua.dev
#   - nexora-api validates Auth__AdminJwt issued by this provider
#     (Authority = https://auth.develop.nxua.dev/application/o/nexora-admin/)
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-nexora-admin-oidc
  namespace: authentik
  labels:
    app.kubernetes.io/instance: authentik
data:
  nexora-admin-oidc.yaml: |
    version: 1
    metadata:
      name: nexora-admin-oidc
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: nexora-admin-oidc
        identifiers:
          name: nexora-admin
        attrs:
          name: nexora-admin
          client_type: confidential
          client_id: nexora-admin
          # client_secret is auto-generated by Authentik on first apply.
          # Operator MUST copy it from Authentik UI → Providers →
          # nexora-admin → Edit, then:
          #   vault kv put kv/nexora/develop/oidc/nexora-admin \
          #     client_secret=<the-value>
          # See platform/secrets/README.md §17 for the full procedure.
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          # invalidation_flow is required by Authentik 2025.x+ — logout/
          # session revocation flow. Reuses the same default flow used
          # by built-in providers.
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: minutes=10
          refresh_token_validity: days=30
          include_claims_in_id_token: true
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          # Authentik 2025.x expects redirect_uris as a list of objects
          # (`matching_mode: strict` + `url`), not a newline-delimited
          # string. Listed explicitly so blueprint apply doesn't get the
          # "Expected a list of items but got type str" serializer error.
          redirect_uris:
            - matching_mode: strict
              url: https://admin.develop.nxua.dev/signin-oidc
            - matching_mode: strict
              url: https://admin.develop.nxua.dev/signin-callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid-groups]]

      - model: authentik_core.application
        identifiers:
          slug: nexora-admin
        attrs:
          name: Nexora Admin (develop)
          slug: nexora-admin
          provider: !KeyOf nexora-admin-oidc
          meta_launch_url: https://admin.develop.nxua.dev
          policy_engine_mode: any
          group: Nexora
