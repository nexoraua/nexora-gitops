# Grafana Alloy config — unified telemetry pipeline for Nexora.
#
# Metrics:
#   - scrapes Prometheus-annotated pods, kube-state-metrics, node-exporter
#   - receives OTLP metrics pushed by apps
#   all forwarded to vminsert (VictoriaMetrics cluster).
# Logs:   tails every pod's container logs -> Loki.
# Traces: receives OTLP traces from apps -> Tempo.
#
# VictoriaMetrics is the single metrics backend; vmselect exposes a
# Prometheus-compatible query API, so Lens / Grafana point straight at
# it — there is no separate Prometheus instance.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "json"
    }

    // ===================== METRICS BACKEND =====================
    prometheus.remote_write "vm" {
      endpoint {
        url = "http://vminsert-vm.monitoring.svc:8480/insert/0/prometheus/api/v1/write"
      }
    }

    // ===================== POD DISCOVERY =======================
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // --- Prometheus-annotated application pods ---
    // Keeps pods with prometheus.io/scrape=true, EXCLUDING the
    // kube-state-metrics + node-exporter pods (scraped by dedicated
    // jobs below so their relabeling can differ).
    discovery.relabel "annotated_pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "kube-state-metrics|prometheus-node-exporter"
        action        = "drop"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        action        = "replace"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scheme"]
        regex         = "(https?)"
        target_label  = "__scheme__"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "kubernetes_node"
      }
    }

    prometheus.scrape "annotated_pods" {
      targets    = discovery.relabel.annotated_pods.output
      forward_to = [prometheus.remote_write.vm.receiver]
    }

    // --- kube-state-metrics ---
    discovery.relabel "kube_state_metrics" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "kube-state-metrics"
        action        = "keep"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
        action        = "replace"
      }
    }

    prometheus.scrape "kube_state_metrics" {
      targets    = discovery.relabel.kube_state_metrics.output
      forward_to = [prometheus.remote_write.vm.receiver]
    }

    // --- node-exporter ---
    discovery.relabel "node_exporter" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "prometheus-node-exporter"
        action        = "keep"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "instance"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "kubernetes_node"
      }
    }

    prometheus.scrape "node_exporter" {
      targets    = discovery.relabel.node_exporter.output
      forward_to = [prometheus.relabel.node_exporter_fixup.receiver]
    }

    // Normalise the root-fs mountpoint so dashboards keying off "/"
    // still match (Talos exposes the host root at /var inside the pod).
    prometheus.relabel "node_exporter_fixup" {
      forward_to = [prometheus.remote_write.vm.receiver]

      rule {
        source_labels = ["mountpoint"]
        regex         = "/var"
        target_label  = "mountpoint"
        replacement   = "/"
        action        = "replace"
      }
    }

    // ===================== KUBELET + cADVISOR =================
    // Container CPU/memory (cadvisor) and kubelet metrics — required
    // for the Lens IDE to render pod/container resource graphs.
    discovery.kubernetes "nodes" {
      role = "node"
    }

    // kubelet /metrics
    discovery.relabel "kubelet" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "instance"
      }
    }

    prometheus.scrape "kubelet" {
      targets    = discovery.relabel.kubelet.output
      scheme     = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      forward_to = [prometheus.remote_write.vm.receiver]
    }

    // kubelet /metrics/cadvisor (per-container resource usage)
    discovery.relabel "cadvisor" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "instance"
      }
    }

    prometheus.scrape "cadvisor" {
      targets    = discovery.relabel.cadvisor.output
      scheme     = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      forward_to = [prometheus.remote_write.vm.receiver]
    }

    // ===================== KUBE-APISERVER ====================
    // Self-metrics from the kube-apiserver. Scraped here (not via the
    // chart's ServiceMonitor, which would need vmagent) so the GitOps
    // vm-* apiserver rules — client-cert expiry, aggregated-API health,
    // request error rates — evaluate against real data instead of an
    // empty series. job="apiserver" matches the kube-prometheus rule
    // convention those rules query (up{job="apiserver"}). Discovered via
    // the default/kubernetes Endpoints (the real apiserver instance),
    // scraped over the in-cluster TLS with the Alloy SA token; the
    // alloy-node-metrics ClusterRole already grants nonResourceURL
    // /metrics (see rbac.yaml).
    discovery.kubernetes "apiserver" {
      // Cluster-wide endpoints discovery; the keep-rule below isolates the
      // single default/kubernetes:https endpoint. (A namespaces{names=...}
      // scope yielded zero discovered targets on Alloy v1.4.3, so rely on
      // the relabel keep instead.)
      role = "endpoints"
    }

    discovery.relabel "apiserver" {
      targets = discovery.kubernetes.apiserver.targets

      // Keep only the default/kubernetes:https endpoints (the apiserver),
      // dropping every other Service's endpoints the role discovers.
      rule {
        source_labels = [
          "__meta_kubernetes_namespace",
          "__meta_kubernetes_service_name",
          "__meta_kubernetes_endpoint_port_name",
        ]
        regex  = "default;kubernetes;https"
        action = "keep"
      }
      rule {
        target_label = "job"
        replacement  = "apiserver"
      }
    }

    prometheus.scrape "apiserver" {
      targets           = discovery.relabel.apiserver.output
      scheme            = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      // Unlike the per-node kubelet serving cert, the apiserver cert carries
      // the kubernetes.default.svc SAN, so verify it properly (server_name +
      // the cluster CA) rather than skipping verification.
      tls_config {
        ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        server_name = "kubernetes.default.svc"
      }
      forward_to = [prometheus.remote_write.vm.receiver]
    }

    // ===================== OTLP INGEST (apps) ==================
    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        metrics = [otelcol.processor.batch.default.input]
        logs    = [otelcol.processor.batch.default.input]
        traces  = [otelcol.processor.batch.default.input]
      }
    }

    otelcol.processor.batch "default" {
      output {
        metrics = [otelcol.exporter.prometheus.vm.input]
        logs    = [otelcol.exporter.loki.default.input]
        traces  = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.prometheus "vm" {
      forward_to = [prometheus.remote_write.vm.receiver]
    }

    otelcol.exporter.loki "default" {
      forward_to = [loki.write.default.receiver]
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo.monitoring.svc:4317"
        tls {
          insecure = true
        }
      }
    }

    // ===================== POD LOGS -> LOKI ====================
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki-gateway.monitoring.svc/loki/api/v1/push"
      }
    }
