# ESO SecretStore for cross-namespace read of the CNPG-managed app
# role credentials (Secret `nexora-business-develop-app` in the
# postgresql namespace, created by the CloudNativePG Cluster
# controller). Strong pattern: never duplicate the DB password into
# Vault — pull it directly from the source of truth so rotation by
# CNPG is reflected in the running app without operator intervention.
#
# Authentication uses a dedicated SA (`eso-cnpg-reader`) in the admin
# namespace. The Role in postgresql ns grants GET on JUST the named
# CNPG secret — least privilege.
#
# Sync wave 0 (default): SecretStore + RBAC must exist before
# ExternalSecret reconciles in wave 0.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cnpg-reader
  namespace: nexora-admin
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-cnpg-reader
  namespace: postgresql
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nexora-business-develop-app"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-cnpg-reader
  namespace: postgresql
subjects:
  - kind: ServiceAccount
    name: eso-cnpg-reader
    namespace: nexora-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-cnpg-reader
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cnpg-business-app
  namespace: nexora-admin
spec:
  provider:
    kubernetes:
      remoteNamespace: postgresql
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cnpg-reader
