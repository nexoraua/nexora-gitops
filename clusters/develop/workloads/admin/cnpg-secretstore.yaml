# ESO SecretStore for cross-namespace read of the CNPG-managed app
# role credentials (Secret `nexora-business-develop-app` in the
# postgresql namespace, created by the CloudNativePG Cluster
# controller). Strong pattern: never duplicate the DB password into
# Vault — pull it directly from the source of truth so rotation by
# CNPG is reflected in the running app without operator intervention.
#
# Authentication uses a dedicated SA (`eso-cnpg-reader`) in the admin
# namespace. The cross-namespace RBAC (Role + RoleBinding in postgresql
# ns) lives at clusters/develop/stateful/postgresql/eso-cnpg-reader-rbac.yaml
# because the apps AppProject does not permit destinations: postgresql —
# only the cnpg-business Application (data AppProject) can sync there.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cnpg-reader
  namespace: nexora-admin
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cnpg-business-app
  namespace: nexora-admin
spec:
  provider:
    kubernetes:
      remoteNamespace: postgresql
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cnpg-reader
