# Admin app secret materialization. Strong split — three concerns,
# three ExternalSecrets, three SoT:
#
#   1. ghcr-pull-secret  — Vault kv/nexora/develop/registry/ghcr
#      (username + password; ESO templates a dockerconfigjson Secret).
#
#   2. nexora-admin-db-conn — CNPG `nexora-business-develop-app`
#      Secret in the postgresql namespace (rotation-tracked source of
#      truth). ESO templates the .NET connection string from
#      {username, password}. SecretStore + RBAC live in
#      cnpg-secretstore.yaml.
#
#   3. nexora-admin-runtime — Vault kv/nexora/develop/apps/admin/{runtime,
#      oidc/nexora-admin}. Only TRUE secrets: blind-index pepper, Vault
#      token (until K8s auth migration), and the auto-generated OIDC
#      client_secret. Public OIDC config (Authority, ClientId) moved to
#      env vars in deployment-patch.yaml — see comments there.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: nexora/develop/registry/ghcr
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/develop/registry/ghcr
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexora-admin-db-conn
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cnpg-business-app
    kind: SecretStore
  target:
    name: nexora-admin-db-conn
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # .NET connection string format. Host is the CNPG read-write
        # Service (-rw) — switches automatically to the current primary
        # on failover. Database/Pooling defaults match the app
        # baseline; tune Maximum Pool Size per app load profile.
        ConnectionStrings__NexoraDb: "Host=nexora-business-develop-rw.postgresql.svc;Database=nexora;Username={{ .username }};Password={{ .password }};Pooling=true;Maximum Pool Size=20;Include Error Detail=true"
  data:
    - secretKey: username
      remoteRef:
        key: nexora-business-develop-app
        property: username
    - secretKey: password
      remoteRef:
        key: nexora-business-develop-app
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexora-admin-runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: nexora-admin-runtime
    creationPolicy: Owner
  data:
    - secretKey: BlindIndex__PepperBase64
      remoteRef:
        key: nexora/develop/apps/admin/runtime
        property: blind_index_pepper_base64
    - secretKey: Vault__Token
      remoteRef:
        key: nexora/develop/apps/admin/runtime
        property: vault_token
    # OIDC client_secret auto-generated by the Authentik blueprint
    # nexora-admin-oidc.yaml. After the blueprint applies, operator
    # copies the value from Authentik UI → Providers → nexora-admin
    # → Edit → Client Secret, then:
    #   vault kv put kv/nexora/develop/oidc/nexora-admin \
    #     client_secret=<value>
    # (See platform/secrets/README.md §17.)
    - secretKey: Auth__Authentik__ClientSecret
      remoteRef:
        key: nexora/develop/oidc/nexora-admin
        property: client_secret
