namespace: nexora-admin

resources:
- ../../../_base/workloads/admin
- cnpg-secretstore.yaml
- external-secrets.yaml
- ingress.yaml

patches:
- path: deployment-patch.yaml

# Image tags managed by nexora-backend CI (ci.yml `deploy` job runs
# `kustomize edit set image` on push). Bootstrapping with the same sha
# staging is currently pinned to so a from-zero rebuild lands a
# pullable image even before the first develop CI run.
images:
- digest: sha256:b0ff974f0a990191fac17dedfd749d741184fe2d5f1e242b76ecf0a5d0a8d81c
  name: ghcr.io/nexoraua/nexora-admin
  newName: ghcr.io/nexoraua/nexora-admin
  newTag: sha-e82c102748dd
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
