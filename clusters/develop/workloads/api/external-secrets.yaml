# API app secret materialization. Strong split — two concerns,
# three ExternalSecrets:
#
#   1. ghcr-pull-secret — Vault kv/nexora/develop/registry/ghcr
#      (username + password; ESO templates dockerconfigjson).
#
#   2. nexora-api-db-conn — CNPG `nexora-business-develop-app`
#      Secret in postgresql ns (rotation-tracked source of truth).
#      ESO templates the .NET connection string. SecretStore +
#      RBAC in cnpg-secretstore.yaml.
#
#   3. nexora-api-runtime — Vault kv/nexora/develop/apps/api/runtime.
#      Only TRUE secrets: blind-index pepper + Vault token. ALL JWT
#      validation config (Auth__UserJwt__*, Auth__AdminJwt__*) lives
#      in deployment-patch.yaml env — those are PUBLIC OIDC config
#      values (authorities, issuers, audiences, https flag) which the
#      API uses only to verify signatures via JWKS. Putting them in
#      Vault was a categorization mistake — they ship as env vars now.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: nexora/develop/registry/ghcr
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/develop/registry/ghcr
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexora-api-db-conn
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cnpg-business-app
    kind: SecretStore
  target:
    name: nexora-api-db-conn
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ConnectionStrings__NexoraDb: "Host=nexora-business-develop-rw.postgresql.svc;Database={{ .dbname }};Username={{ .username }};Password={{ .password }};Pooling=true;Maximum Pool Size=50;Include Error Detail=true"
  data:
    - secretKey: username
      remoteRef:
        key: nexora-business-develop-app
        property: username
    - secretKey: password
      remoteRef:
        key: nexora-business-develop-app
        property: password
    # CNPG-provided dbname (default "app"); avoids hardcoding a name
    # that the app role can't create.
    - secretKey: dbname
      remoteRef:
        key: nexora-business-develop-app
        property: dbname
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexora-api-runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: nexora-api-runtime
    creationPolicy: Owner
  data:
    - secretKey: BlindIndex__PepperBase64
      remoteRef:
        key: nexora/develop/apps/api/runtime
        property: blind_index_pepper_base64
    - secretKey: Vault__Token
      remoteRef:
        key: nexora/develop/apps/api/runtime
        property: vault_token
