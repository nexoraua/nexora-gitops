apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexora-api
spec:
  entryPoints:
    - websecure
  routes:
    # API surface lives on api.develop.nxua.dev:
    #   /api/*     — business endpoints
    #   /openapi/* — JSON spec
    #   /scalar/*  — interactive UI
    # The non-/api prefixes are exposed in develop + staging only;
    # Production drops them at the app layer (Program.cs gates
    # MapOpenApi + MapScalarApiReference on !IsProduction).
    - match: Host(`api.develop.nxua.dev`) && (PathPrefix(`/api`) || PathPrefix(`/openapi`) || PathPrefix(`/scalar`))
      kind: Rule
      priority: 100
      middlewares:
        # Same-namespace ref (defined below). Traefik has no allowCrossNamespace,
        # so a `namespace: traefik` ref is rejected and the whole router 404s.
        - name: rate-limit-api
      services:
        - name: nexora-api
          port: 80
  tls:
    secretName: nexora-api-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nexora-api-tls
spec:
  secretName: nexora-api-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: api.develop.nxua.dev
  dnsNames:
    - api.develop.nxua.dev
  duration: 2160h
  renewBefore: 360h
---
# Edge rate limit for the public API. Defined in the api workload namespace
# (nexora-api) and referenced same-namespace by the IngressRoute above — the
# shared traefik/-namespaced copy is unusable (not deployed there, and Traefik
# has no allowCrossNamespace). Mirrors the frontend/admin secure-headers pattern.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-api
spec:
  rateLimit:
    average: 30
    burst: 60
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
