namespace: nexora-api

resources:
- ../../../_base/workloads/api
- cnpg-secretstore.yaml
- external-secrets.yaml
- ingress.yaml

patches:
- path: deployment-patch.yaml
- path: migration-job-patch.yaml

# Image tags managed by nexora-backend CI (ci.yml `deploy` job runs
# `kustomize edit set image` on push). Bootstrapping with the same sha
# staging is currently pinned to so a from-zero rebuild lands a
# pullable image even before the first develop CI run. CI will
# overwrite these on the next push to nexora-backend develop branch.
images:
- digest: sha256:59d968df9b248f63b3a1ca8e1a994459841f699b97d7d4c08a4fd7c2c9536dbb
  name: ghcr.io/nexoraua/nexora-api
  newName: ghcr.io/nexoraua/nexora-api
  newTag: sha-b42f1b018046
- digest: sha256:055f692d1507bfaac3aeb5e1bd6566b42d8988ea6edd6d3b3597992c5b39fe58
  name: ghcr.io/nexoraua/nexora-migrator
  newName: ghcr.io/nexoraua/nexora-migrator
  newTag: sha-b42f1b018046
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
