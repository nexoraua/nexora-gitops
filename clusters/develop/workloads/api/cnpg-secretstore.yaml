# ESO SecretStore for cross-namespace read of the CNPG-managed app
# role credentials (Secret `nexora-business-develop-app` in the
# postgresql namespace). Same pattern as the admin app's
# cnpg-secretstore.yaml — the source of truth for DB credentials is
# CNPG itself, never duplicated into Vault.
#
# The cross-namespace RBAC (Role + RoleBinding in postgresql ns) lives
# at clusters/develop/stateful/postgresql/eso-cnpg-reader-rbac.yaml
# because the apps AppProject does not permit destinations: postgresql.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cnpg-reader
  namespace: nexora-api
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cnpg-business-app
  namespace: nexora-api
spec:
  provider:
    kubernetes:
      remoteNamespace: postgresql
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cnpg-reader
