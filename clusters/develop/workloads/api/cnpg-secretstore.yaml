# ESO SecretStore for cross-namespace read of the CNPG-managed app
# role credentials (Secret `nexora-business-develop-app` in the
# postgresql namespace). Same pattern as the admin app's
# cnpg-secretstore.yaml — the source of truth for DB credentials is
# CNPG itself, never duplicated into Vault.
#
# Separate Role + SA per app (least privilege per namespace).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cnpg-reader
  namespace: nexora-api
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-cnpg-reader-api
  namespace: postgresql
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nexora-business-develop-app"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-cnpg-reader-api
  namespace: postgresql
subjects:
  - kind: ServiceAccount
    name: eso-cnpg-reader
    namespace: nexora-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-cnpg-reader-api
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cnpg-business-app
  namespace: nexora-api
spec:
  provider:
    kubernetes:
      remoteNamespace: postgresql
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cnpg-reader
