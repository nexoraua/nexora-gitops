# Frontend ingress — Flutter Web mobile-app shell. Served on the
# apex `develop.nxua.dev` (no `app.` prefix). Wildcard
# *.develop.nxua.dev does NOT cover the apex; the root A-record is
# provisioned by the Terraform `cloudflare_dns_record.ingress_root`
# resource (nexora-infra modules/hetzner-talos-cluster/platform.tf).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexora-frontend
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`develop.nxua.dev`) && PathPrefix(`/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: secure-headers
      services:
        - name: nexora-frontend
          port: 80
  tls:
    secretName: nexora-frontend-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nexora-frontend-tls
spec:
  secretName: nexora-frontend-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: develop.nxua.dev
  dnsNames:
    - develop.nxua.dev
  duration: 2160h
  renewBefore: 360h
