namespace: nexora-frontend

resources:
- ../../../_base/workloads/frontend
- external-secrets.yaml
- ingress.yaml

# Image tags managed by nexora-frontend CI (ci.yml `deploy` job runs
# `kustomize edit set image` on push). Bootstrapping with the same sha
# staging is currently pinned to so a from-zero rebuild lands a
# pullable image even before the first develop CI run.
images:
- digest: sha256:46e41f377047063142412af14a3de3f1a63cb03221486051ac03a04497841952
  name: ghcr.io/nexoraua/nexora-frontend
  newName: ghcr.io/nexoraua/nexora-frontend
  newTag: sha-68f16a0497e7
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
