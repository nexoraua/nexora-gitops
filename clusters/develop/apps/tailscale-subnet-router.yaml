# Tailscale Connector CR — runs a subnet router that advertises the
# Hetzner private network (10.40.0.0/16) into the tailnet.
# Engineers with the tailnet can then reach the cluster's internal
# services without their public IP being in the Hetzner firewall.
#
# Connector CRD ships with the Tailscale operator; this manifest depends
# on apps/tailscale.yaml being synced first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-subnet-router
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/nexoraua/nexora-gitops.git
    targetRevision: main
    path: clusters/develop/platform/tailscale
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
