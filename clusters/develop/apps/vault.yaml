apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    # Vault first — everything else uses External Secrets via Vault backend.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: apps
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      values: |
        # On develop we run Vault with TLS disabled inside the cluster and
        # rely on Linkerd mTLS for service-to-service confidentiality. The
        # UI is fronted by Traefik with a Let's Encrypt cert, so external
        # traffic is still TLS. On production we re-enable in-pod TLS with
        # certs issued by cert-manager (see platform/vault/ once the prod
        # cluster comes online).
        global:
          tlsDisable: true
        server:
          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: true
              setNodeId: true
              config: |
                ui = true
                listener "tcp" {
                  tls_disable = 1
                  address     = "[::]:8200"
                  cluster_address = "[::]:8201"
                }
                storage "raft" {
                  path = "/vault/data"
                  retry_join {
                    leader_api_addr = "http://vault-0.vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://vault-1.vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://vault-2.vault-internal:8200"
                  }
                }
                service_registration "kubernetes" {}
                # Auto-unseal on develop is via Shamir keys held by ops in
                # 1Password. Production wires this up to an HSM or another
                # KMS once available.
          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: hcloud-volumes
          # Develop has 4 nodes (worker-1, system-1, stateful-1,
          # control-plane-1). For 3 raft replicas we must tolerate the
          # system + database taints so the StatefulSet can spread across
          # worker-1 / system-1 / stateful-1 (hard pod anti-affinity by
          # hostname satisfies). Control-plane stays excluded. The vault
          # chart expects tolerations as a string, not an inline list.
          tolerations: |
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
            - key: nodepool
              operator: Equal
              value: database
              effect: NoSchedule
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
        ui:
          enabled: true
          serviceType: ClusterIP
        injector:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-system
  syncPolicy:
    automated:
      prune: false  # never auto-prune Vault — manual approval only
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
