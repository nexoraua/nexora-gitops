apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.*.*
    helm:
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: s3
            bucketNames:
              chunks: nexora-develop-loki
              ruler:  nexora-develop-loki
              admin:  nexora-develop-loki
            s3:
              endpoint: https://fsn1.your-objectstorage.com
              region: fsn1
              s3ForcePathStyle: true
              accessKeyId: ${LOKI_S3_ACCESS_KEY}
              secretAccessKey: ${LOKI_S3_SECRET_KEY}
              insecure: false
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: index_
                  period: 24h
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: hcloud-volumes
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        gateway:
          enabled: true
          replicas: 1
        chunksCache:
          enabled: false       # develop only; enable on staging/prod
        resultsCache:
          enabled: false
        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
