# Bootstrap ExternalSecret manifests for stateful workloads + observability.
# Real secret values must be seeded into Vault manually before first sync;
# see clusters/develop/platform/secrets/README.md for the runbook.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-secrets
  namespace: argocd
  annotations:
    # Sync after Vault + ClusterSecretStore (wave -1, 0) and before
    # workloads that depend on these Secrets (CNPG, RabbitMQ, Authentik,
    # Grafana, Loki, Tempo on wave 0..2).
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/nexora/nexora-gitops.git
    targetRevision: main
    path: clusters/develop/platform/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
