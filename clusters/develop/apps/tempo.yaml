apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.16.0
    helm:
      values: |
        tempo:
          storage:
            trace:
              backend: s3
              s3:
                bucket: nexora-develop-tempo
                endpoint: fsn1.your-objectstorage.com
                region: fsn1
                forcepathstyle: true
                access_key: ${TEMPO_S3_ACCESS_KEY}
                secret_key: ${TEMPO_S3_SECRET_KEY}
                insecure: false
          retention: 168h     # 7 days on develop; prod retention is 30d
        persistence:
          enabled: true
          storageClass: hcloud-volumes
          size: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
