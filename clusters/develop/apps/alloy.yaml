# Grafana Alloy — unified OTel telemetry collector (DaemonSet per node).
# Replaces previous mix of vmagent client + Promtail + OTel Collector.
# Forwards:
#   - metrics  → vminsert (VictoriaMetrics)
#   - logs     → Loki
#   - traces   → Tempo
#
# Multi-source Application: source 1 is the upstream Helm chart, source
# 2 delivers the alloy-config ConfigMap from this repo (the chart is
# told configMap.create=false and points at that ConfigMap by name).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 0.9.2
      helm:
        values: |
          controller:
            type: daemonset
            # Alloy is the per-node telemetry collector — it must run on
            # EVERY node, including the tainted control-plane / system /
            # database pools. Without this it lands only on worker-1.
            tolerations:
              - operator: Exists
          alloy:
            mounts:
              varlog: true     # tail container logs
              dockercontainers: true
            configMap:
              create: false
              name: alloy-config   # delivered by source 2 below
            extraPorts:
              - name: otlp-grpc
                port: 4317
                targetPort: 4317
                protocol: TCP
              - name: otlp-http
                port: 4318
                targetPort: 4318
                protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              # 512Mi was tight for the grown cluster (many pod-log streams)
              # and OOM'd under an apiserver scrape; 768Mi gives headroom for
              # the restart log-backfill spike.
              limits:
                memory: 768Mi
          crds:
            create: false
    - repoURL: https://github.com/nexoraua/nexora-gitops.git
      targetRevision: main
      path: clusters/develop/platform/alloy
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
