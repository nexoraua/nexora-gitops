# kube-prometheus-stack — only used as a 6h-retention scrape engine
# for kube-state-metrics / node-exporter / Lens IDE compatibility.
# It does NOT store business metrics or evaluate alert rules — those
# live in VictoriaMetrics + vmalert (clusters/develop/apps/victoria-metrics.yaml).
# Prometheus pushes everything to VM via remote_write.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: observability
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 66.5.0
    helm:
      values: |
        crds:
          enabled: true
        alertmanager:
          enabled: false      # vmalert handles alerting
        grafana:
          enabled: false      # standalone Grafana app (apps/grafana.yaml)
        prometheus:
          prometheusSpec:
            retention: 6h
            retentionSize: 5GiB
            remoteWrite:
              - url: http://vminsert-vm.monitoring.svc:8480/insert/0/prometheus/api/v1/write
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: linstor-r1
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        kube-state-metrics:
          enabled: true
        nodeExporter:
          enabled: true
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
