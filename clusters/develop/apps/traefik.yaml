apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 33.*.*
    helm:
      values: |
        deployment:
          replicas: 2
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: false
          kubernetesIngress:
            enabled: true
            publishedService:
              enabled: true
        ports:
          web:
            redirectTo:
              port: websecure
              priority: 10
          websecure:
            tls:
              enabled: true
        service:
          enabled: true
          type: LoadBalancer
          annotations:
            # Hetzner Cloud Controller Manager picks up these annotations.
            load-balancer.hetzner.cloud/name: nexora-ingress-develop
            load-balancer.hetzner.cloud/use-private-ip: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
        metrics:
          prometheus:
            enabled: true
            entryPoint: metrics
        logs:
          general:
            format: json
            level: INFO
          access:
            enabled: true
            format: json
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
