# Authentik central IdP — OIDC for admin app, ArgoCD, Grafana, vmui,
# RabbitMQ Management. Upstream OIDC source: Google Workspace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: apps
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2024.10.5
    helm:
      values: |
        global:
          envFrom:
            - secretRef:
                name: authentik-bootstrap
            # Google OAuth client credentials — materialized by ESO from
            # kv/nexora/develop/authentik/google-oauth. Referenced by the
            # Google OAuth blueprint via !Env GOOGLE_OAUTH_CLIENT_ID /
            # !Env GOOGLE_OAUTH_CLIENT_SECRET at blueprint-apply time.
            # `optional: true` keeps Authentik bootable if the Vault path
            # is briefly unseeded.
            - secretRef:
                name: authentik-google-oauth
                optional: true
        # Native blueprint loader (ROOT-level chart value, NOT under
        # `authentik:` block — that block is reserved for AUTHENTIK_*
        # env vars). Chart auto-mounts these ConfigMaps at
        # /blueprints/mounted/cm-<name>/ on both server and worker;
        # Authentik scans /blueprints/ recursively and applies any YAML
        # with blueprints.goauthentik.io/instantiate=true.
        blueprints:
          configMaps:
            - authentik-blueprint-google-oauth
            - authentik-blueprint-argocd-rbac
            - authentik-blueprint-argocd-oidc
            - authentik-blueprint-grafana-rbac
            - authentik-blueprint-grafana-oidc
        authentik:
          error_reporting:
            enabled: false
          postgresql:
            host: nexora-authentik-develop-rw.authentik.svc
            name: authentik
            user: authentik
            # Password is injected via envFrom from the
            # authentik-bootstrap Secret (key
            # AUTHENTIK_POSTGRESQL__PASSWORD). Setting this field here
            # would make Helm template the literal `${VAR}` into the
            # chart's authentik Secret, which Authentik then takes as
            # the password verbatim.
          redis:
            host: nexora-cache.dragonfly.svc.cluster.local
        server:
          replicas: 1
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - auth.develop.nxua.dev
            tls:
              - secretName: authentik-tls
                hosts:
                  - auth.develop.nxua.dev
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
        worker:
          replicas: 1
          # Authentik worker hosts both the Celery worker AND the
          # blueprint-apply path (which spins up the full Django app per
          # task). 512Mi → OOMKill during blueprint apply / `ak shell`;
          # 1Gi keeps headroom on top of the ~600Mi steady-state.
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
        postgresql:
          enabled: false   # provided by CloudNativePG (clusters/develop/stateful/authentik/)
        redis:
          enabled: false   # provided by Dragonfly (apps/dragonfly-cache.yaml)
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
