# Authentik central IdP — OIDC for admin app, ArgoCD, Grafana, vmui,
# RabbitMQ Management. Upstream OIDC source: Google Workspace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: apps
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2024.10.5
    helm:
      values: |
        global:
          envFrom:
            - secretRef:
                name: authentik-bootstrap
            # Google OAuth client credentials — materialized by ESO from
            # kv/nexora/develop/authentik/google-oauth. Referenced by the
            # Google OAuth blueprint via !Env GOOGLE_OAUTH_CLIENT_ID /
            # !Env GOOGLE_OAUTH_CLIENT_SECRET at blueprint-apply time.
            # `optional: true` keeps Authentik bootable if the Vault path
            # is briefly unseeded.
            - secretRef:
                name: authentik-google-oauth
                optional: true
        authentik:
          error_reporting:
            enabled: false
          postgresql:
            host: nexora-authentik-develop-rw.authentik.svc
            name: authentik
            user: authentik
            # Password is injected via envFrom from the
            # authentik-bootstrap Secret (key
            # AUTHENTIK_POSTGRESQL__PASSWORD). Setting this field here
            # would make Helm template the literal `${VAR}` into the
            # chart's authentik Secret, which Authentik then takes as
            # the password verbatim.
          redis:
            host: nexora-cache.dragonfly.svc.cluster.local
        server:
          replicas: 1
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - auth.develop.nxua.dev
            tls:
              - secretName: authentik-tls
                hosts:
                  - auth.develop.nxua.dev
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
        worker:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          # Mount custom blueprints. Authentik worker scans /blueprints/
          # recursively at startup and watches for changes; any YAML with
          # blueprints.goauthentik.io/instantiate=true is auto-applied.
          # See platform/authentik/blueprints/ for source files.
          extraVolumes:
            - name: blueprint-google-oauth
              configMap:
                name: authentik-blueprint-google-oauth
          extraVolumeMounts:
            - name: blueprint-google-oauth
              mountPath: /blueprints/custom/google-oauth
              readOnly: true
        postgresql:
          enabled: false   # provided by CloudNativePG (clusters/develop/stateful/authentik/)
        redis:
          enabled: false   # provided by Dragonfly (apps/dragonfly-cache.yaml)
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
