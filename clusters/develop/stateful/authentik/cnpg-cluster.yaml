# Authentik state PostgreSQL cluster — separate from business data
# for blast-radius and compliance scope isolation.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-authentik-develop
  namespace: authentik
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-authentik-superuser
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-postgres-credentials
  storage:
    storageClass: linstor-r1
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  affinity:
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  monitoring:
    enablePodMonitor: true
  # Backups disabled for develop until a Hetzner Object Storage bucket
  # + S3 credentials are provisioned. Staging/production re-enable
  # `backup.barmanObjectStore` against nexora-cnpg-backups-<env>.
