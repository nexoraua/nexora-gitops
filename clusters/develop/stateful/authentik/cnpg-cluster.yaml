# Authentik state PostgreSQL cluster — separate from business data
# for blast-radius and compliance scope isolation.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-authentik-develop
  namespace: authentik
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-authentik-superuser
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-postgres-credentials
  storage:
    storageClass: hcloud-volumes
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  affinity:
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  monitoring:
    enablePodMonitor: true
  backup:
    barmanObjectStore:
      destinationPath: s3://nexora-develop-cnpg-backups/authentik
      endpointURL: https://fsn1.your-objectstorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-authentik-s3-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-authentik-s3-backup
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"
