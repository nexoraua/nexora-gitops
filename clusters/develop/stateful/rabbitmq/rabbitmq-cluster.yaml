# RabbitMQ cluster — message bus for MassTransit integration events,
# sagas, and outbox dispatch.
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: nexora-rabbitmq
  namespace: rabbitmq
spec:
  replicas: 1                        # develop: single; staging 3; prod 3+federation
  image: rabbitmq:4.0-management
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  persistence:
    storageClassName: linstor-r1
    storage: 10Gi
  rabbitmq:
    additionalConfig: |
      cluster_partition_handling = pause_minority
      collect_statistics_interval = 10000
      default_queue_type = quorum
  override:
    statefulSet:
      spec:
        template:
          metadata:
            annotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "15692"
          spec:
            containers: []
  secretBackend:
    externalSecret:
      name: rabbitmq-credentials
