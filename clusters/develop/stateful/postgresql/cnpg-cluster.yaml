# Business PostgreSQL 18 cluster for develop.
# Schemas per bounded context — identity, wallet, investments, contracts,
# notifications, fop, audit, quartz (Quartz.NET state).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-business-develop
  namespace: postgresql
spec:
  instances: 1   # develop has only one nodepool=database node; staging/prod use 2 + 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-superuser
  # Grafana Alloy scrapes by prometheus.io/scrape annotation (vmagent is
  # disabled cluster-wide), so the instance pods must carry it. CNPG
  # propagates inheritedMetadata to every managed resource, pods
  # included. Port 9187 is the CNPG metrics exporter.
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
  storage:
    storageClass: linstor-r1
    size: 20Gi
  walStorage:
    storageClass: linstor-r1
    size: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "16MB"
      wal_level: "logical"          # for future CDC to ClickHouse
      pg_stat_statements.track: "all"
    pg_hba:
      - host all all 10.40.0.0/16 scram-sha-256
    shared_preload_libraries:
      - pg_stat_statements
      - pgaudit
  monitoring:
    # PodMonitor disabled: nothing consumes it (vmagent is off, Alloy
    # scrapes via the prometheus.io/scrape annotation set above).
    enablePodMonitor: false
  # Continuous backup: WAL archiving + scheduled base backups to Hetzner
  # Object Storage (FSN1), bucket nexora-cnpg-backups-develop. WAL
  # archiving gives PITR; the ScheduledBackup below takes a daily base.
  #
  # IMMUTABILITY (verified findings):
  #  - barman-cloud CAN write to a Hetzner Object Storage bucket with S3
  #    Object Lock enabled. The earlier AccessDenied was caused by the
  #    bucket's S3 Public Access Block, which Hetzner OS enforces against
  #    the bucket owner too — not by Object Lock. PAB must stay OFF on
  #    this bucket.
  #  - Hetzner OS Object Lock in GOVERNANCE mode is weak: a delete_object
  #    without BypassGovernanceRetention still succeeds despite an active
  #    retention. So Hetzner Object Lock does not give trustworthy WORM.
  # PRODUCTION design: barman writes this mutable Hetzner primary; a
  # separate monitored sync job replicates to a cross-provider AWS S3
  # bucket with SSE-KMS + COMPLIANCE-mode Object Lock (the immutable DR
  # copy). See architecture.md backup section.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://nexora-cnpg-backups-develop/"
      endpointURL: "https://fsn1.your-objectstorage.com"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: SECRET_ACCESS_KEY
      # NOTE: Hetzner Object Storage rejects the SSE header (AES256) with
      # InvalidArgument, so barmanObjectStore-level `encryption:` cannot
      # be set here. Backup data therefore relies on Hetzner Object
      # Storage's own at-rest encryption. PRODUCTION requirement: use a
      # backup target that supports SSE (or client-side encryption) — a
      # fintech DB backup must be encrypted at rest with an owned key.
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2
---
# Daily base backup at 03:00; combined with continuous WAL archiving
# this gives point-in-time recovery within the 30-day retention window.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nexora-business-develop-daily
  namespace: postgresql
spec:
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: nexora-business-develop
  method: barmanObjectStore
