# Business PostgreSQL 18 cluster for develop.
# Schemas per bounded context — identity, wallet, investments, contracts,
# notifications, fop, audit, quartz (Quartz.NET state).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-business-develop
  namespace: postgresql
spec:
  instances: 1   # develop has only one nodepool=database node; staging/prod use 2 + 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-superuser
  storage:
    storageClass: linstor-r1
    size: 20Gi
  walStorage:
    storageClass: linstor-r1
    size: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "16MB"
      wal_level: "logical"          # for future CDC to ClickHouse
      pg_stat_statements.track: "all"
    pg_hba:
      - host all all 10.40.0.0/16 scram-sha-256
    shared_preload_libraries:
      - pg_stat_statements
      - pgaudit
  monitoring:
    enablePodMonitor: true
  # Backups disabled for develop until a Hetzner Object Storage bucket
  # + S3 credentials are provisioned. Staging/production re-enable
  # `backup.barmanObjectStore` + a ScheduledBackup pointing at
  # nexora-cnpg-backups-<env>.
