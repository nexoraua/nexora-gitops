# Business PostgreSQL 18 cluster for develop.
# Schemas per bounded context — identity, wallet, investments, contracts,
# notifications, fop, audit, quartz (Quartz.NET state).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-business-develop
  namespace: postgresql
spec:
  instances: 1   # develop has only one nodepool=database node; staging/prod use 2 + 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-superuser
  storage:
    storageClass: linstor-r1
    size: 20Gi
  walStorage:
    storageClass: linstor-r1
    size: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "16MB"
      wal_level: "logical"          # for future CDC to ClickHouse
      pg_stat_statements.track: "all"
    pg_hba:
      - host all all 10.40.0.0/16 scram-sha-256
    shared_preload_libraries:
      - pg_stat_statements
      - pgaudit
  monitoring:
    enablePodMonitor: true
  # Continuous backup: WAL archiving + scheduled base backups to AWS S3
  # (eu-central-1) — a different provider than the Hetzner cluster, so a
  # Hetzner-wide outage does not take the backups with it. WAL archiving
  # gives PITR; the ScheduledBackup below takes a daily base backup.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://nexora-cnpg-backups-develop/"
      endpointURL: "https://s3.eu-central-1.amazonaws.com"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2
---
# Daily base backup at 03:00; combined with continuous WAL archiving
# this gives point-in-time recovery within the 30-day retention window.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nexora-business-develop-daily
  namespace: postgresql
spec:
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: nexora-business-develop
  method: barmanObjectStore
