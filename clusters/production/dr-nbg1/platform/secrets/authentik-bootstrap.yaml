# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Authentik bootstrap secrets — regional Vault path
# kv/nexora/production-nbg1/authentik-bootstrap. Postgres host points at
# the regional CNPG replica nexora-authentik-production-nbg1-rw.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-bootstrap
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: authentik-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: nexora/production-nbg1/authentik/bootstrap
        property: secret_key
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: nexora/production-nbg1/authentik/bootstrap
        property: bootstrap_admin_password
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: nexora/production-nbg1/authentik/bootstrap
        property: bootstrap_admin_token
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: nexora/production-nbg1/authentik/postgres
        property: password
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: nexora/production-nbg1/authentik/postgres
        property: password
