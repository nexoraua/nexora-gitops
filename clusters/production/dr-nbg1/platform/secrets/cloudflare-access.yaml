# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Cloudflare Access — JWT audience tags scoped to *-nbg1.nxua.dev hosts.
# Vault path kv/nexora/production-nbg1/cloudflare-access.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-access
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cloudflare-access
    creationPolicy: Owner
  data:
    - secretKey: CF_ACCESS_AUD
      remoteRef:
        key: nexora/production-nbg1/cloudflare-access
        property: aud
    - secretKey: CF_ACCESS_TEAM_DOMAIN
      remoteRef:
        key: nexora/production-nbg1/cloudflare-access
        property: team-domain
