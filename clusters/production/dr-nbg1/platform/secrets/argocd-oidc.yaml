# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# ArgoCD OIDC client credentials — regional Vault path
# kv/nexora/production-nbg1/argocd-oidc. Only applies if the DR cluster
# runs its own Argo CD instance (otherwise central FSN1 Argo CD owns the
# argocd-secret merge in this cluster as a destination).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    template:
      metadata: {}
  data:
    - secretKey: oidc.authentik.clientID
      remoteRef:
        key: nexora/production-nbg1/oidc/argocd
        property: client_id
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: nexora/production-nbg1/oidc/argocd
        property: client_secret
