# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Tailscale auth key for the NBG1 subnet router. Tagged
# tag:k8s + tag:nexora-production-nbg1. Vault path
# kv/nexora/production-nbg1/tailscale-oauth.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: tailscale-auth
    creationPolicy: Owner
  data:
    - secretKey: auth-key
      remoteRef:
        key: nexora/production-nbg1/tailscale
        property: auth-key
