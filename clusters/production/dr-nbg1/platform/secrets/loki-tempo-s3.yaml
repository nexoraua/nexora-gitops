# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Loki + Tempo S3 credentials — regional Hetzner Object Storage buckets
# nexora-loki-production-nbg1 / nexora-tempo-production-nbg1. Vault path
# kv/nexora/production-nbg1/loki-tempo-s3.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: loki-s3
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: nexora/production-nbg1/object-storage/loki
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production-nbg1/object-storage/loki
        property: secret_access_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tempo-s3
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: tempo-s3
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: nexora/production-nbg1/object-storage/tempo
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production-nbg1/object-storage/tempo
        property: secret_access_key
