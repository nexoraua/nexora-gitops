# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Streaming-replication credentials. The NBG1 CNPG clusters use these to
# authenticate as user `streaming_replica` against the FSN1 primary's RW
# Service (over the tailnet). Username + password are SHARED across
# regions — the password lives in kv/nexora/production-nbg1/cnpg/replication
# but must match the secret seeded in FSN1's
# kv/nexora/production/cnpg/replication; rotation happens in lockstep on
# both regions.
#
# Without this Secret, pg_basebackup against the FSN1 primary fails and
# the regional replicas (nexora-business-production-nbg1 +
# nexora-authentik-production-nbg1) never bootstrap.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-replication
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-replication
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-nbg1/cnpg/replication
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-nbg1/cnpg/replication
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-replication
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-replication
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-nbg1/cnpg/replication
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-nbg1/cnpg/replication
        property: password
