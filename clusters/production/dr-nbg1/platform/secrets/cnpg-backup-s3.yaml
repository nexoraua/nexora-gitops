# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Hetzner Object Storage credentials for CNPG backups — region-specific
# key against the NBG1 buckets nexora-cnpg-backups-production-nbg1 and
# nexora-cnpg-backups-authentik-production-nbg1. Vault path
# kv/nexora/production-nbg1/cnpg-backup-s3.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/production-nbg1/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production-nbg1/cnpg/backup-s3
        property: secret-access-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/production-nbg1/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production-nbg1/cnpg/backup-s3
        property: secret-access-key
