# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# CNPG superuser credentials — regional Vault path
# kv/nexora/production-nbg1/cnpg-superuser. Business + Authentik split as
# in FSN1.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-superuser
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-nbg1/cnpg/superuser
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-nbg1/cnpg/superuser
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-authentik-superuser
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-authentik-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-nbg1/cnpg/authentik-superuser
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-nbg1/cnpg/authentik-superuser
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-postgres-credentials
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: authentik-postgres-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-nbg1/authentik/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-nbg1/authentik/postgres
        property: password
