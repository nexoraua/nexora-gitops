# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Grafana OIDC client credentials — regional Authentik provider
# (auth-nbg1.nxua.dev). Vault path kv/nexora/production-nbg1/grafana-oidc.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-id
      remoteRef:
        key: nexora/production-nbg1/oidc/grafana
        property: client_id
    - secretKey: oidc-client-secret
      remoteRef:
        key: nexora/production-nbg1/oidc/grafana
        property: client_secret
