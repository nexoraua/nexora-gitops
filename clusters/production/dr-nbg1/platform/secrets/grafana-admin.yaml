# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Grafana admin credentials — regional Vault path
# kv/nexora/production-nbg1/grafana-admin.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: nexora/production-nbg1/grafana/admin
        property: username
    - secretKey: admin-password
      remoteRef:
        key: nexora/production-nbg1/grafana/admin
        property: password
