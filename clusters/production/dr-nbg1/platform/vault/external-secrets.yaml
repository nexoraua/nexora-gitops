# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# ClusterSecretStore pointing at the regional Vault. Every ExternalSecret
# in dr-nbg1/platform/secrets/ resolves through this store; the regional
# Vault root-of-trust is still the global AWS KMS Transit key
# alias/nexora-transit-production (shared across FSN1 + DR regions on
# purpose) but KV namespaces are isolated under
# kv/nexora/production-nbg1/*.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: http://vault.vault-system.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
