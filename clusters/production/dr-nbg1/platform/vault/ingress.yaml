# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Vault UI exposed via Traefik on vault-nbg1.nxua.dev. Cloudflare Access
# sits in front (group: infra-ops, WARP enrolled); Cloudflare config lives
# in nexora-infra/environments/production-nbg1/cloudflare/access.tf.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault-ui
  namespace: vault-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vault-nbg1.nxua.dev`)
      kind: Rule
      middlewares:
        - name: cloudflare-jwt-assertion
          namespace: traefik
      services:
        - name: vault-active
          port: 8200
          scheme: http
  tls:
    secretName: vault-ui-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-ui-tls
  namespace: vault-system
spec:
  secretName: vault-ui-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: vault-nbg1.nxua.dev
  dnsNames:
    - vault-nbg1.nxua.dev
  duration: 2160h
  renewBefore: 360h
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cloudflare-jwt-assertion
  namespace: traefik
spec:
  forwardAuth:
    address: http://cf-access-validator.traefik.svc:8080/verify
    trustForwardHeader: true
    authResponseHeaders:
      - X-Cf-Access-Authenticated-User-Email
