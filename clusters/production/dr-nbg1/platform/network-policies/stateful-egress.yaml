# CNPG pods need egress to:
#   - Hetzner Object Storage in NBG1 (regional WAL + base backup buckets)
#   - the FSN1 primary via the Tailscale subnet router (streaming
#     replication). FSN1's private CIDR is 10.60.0.0/16; the local
#     Tailscale router advertises 10.60.0.0/16 in addition to the local
#     10.61.0.0/16. The CIDR allowlist below covers that path.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-object-storage
  namespace: postgresql
spec:
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "nbg1.your-objectstorage.com"
        - matchPattern: "*.nbg1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Streaming replication target: FSN1 primary reachable through the
    # Tailscale subnet router (advertised CIDR 10.60.0.0/16).
    - toCIDR:
        - 10.60.0.0/16
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# Same egress for the authentik-co-located CNPG cluster in NBG1.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-object-storage
  namespace: authentik
spec:
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "nbg1.your-objectstorage.com"
        - matchPattern: "*.nbg1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toCIDR:
        - 10.60.0.0/16
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
