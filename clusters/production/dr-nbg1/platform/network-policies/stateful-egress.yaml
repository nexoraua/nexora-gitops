# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Baseline egress allows for the stateful namespaces in the NBG1 DR region.
# Same shape as FSN1, but Hetzner Object Storage egress retargeted to
# nbg1.your-objectstorage.com (regional buckets nexora-cnpg-backups-
# production-nbg1 / nexora-cnpg-backups-authentik-production-nbg1) and
# CNPG streaming-replica egress allows the FSN1 tailnet CIDR 10.60.0.0/16
# for basebackup pulls through the Tailscale subnet router.
#
# The DR-sync CronJob (rclone -> AWS S3) runs ONLY in FSN1 — the
# cnpg-dr-sync-egress policies are intentionally omitted here.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: postgresql
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: postgresql
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
