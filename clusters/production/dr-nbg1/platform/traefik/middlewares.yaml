# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Shared Traefik middlewares — verbatim from FSN1.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-global
  namespace: traefik
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: traefik
spec:
  headers:
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: strict-origin-when-cross-origin
    frameDeny: true
    customResponseHeaders:
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
      X-Content-Type-Options: nosniff
