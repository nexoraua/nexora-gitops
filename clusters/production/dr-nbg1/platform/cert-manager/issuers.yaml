# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# ClusterIssuers — verbatim from FSN1. Same letsencrypt-prod /
# letsencrypt-staging names; DNS-01 zone unchanged (nxua.dev). The
# cloudflare-api-token Secret is seeded by Terraform
# (nexora-infra/environments/production-nbg1/cert-manager).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@nxua.dev
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - nxua.dev
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@nxua.dev
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - nxua.dev
