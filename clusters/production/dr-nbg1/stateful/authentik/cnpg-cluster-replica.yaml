# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# CNPG streaming-replica bootstrap for the NBG1 Authentik database.
# instances: 0 by default (cold) — flip to 3 on activation.
# Replicates from nexora-authentik-production (FSN1) via Tailscale.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-authentik-production-nbg1
  namespace: authentik
spec:
  instances: 0   # COLD: flip to 3 on activation
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-authentik-superuser
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
  storage:
    storageClass: linstor-r3
    size: 20Gi
  walStorage:
    storageClass: linstor-r3
    size: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  bootstrap:
    pg_basebackup:
      source: nexora-authentik-production
  replica:
    enabled: true
    source: nexora-authentik-production
  externalClusters:
    - name: nexora-authentik-production
      connectionParameters:
        host: nexora-authentik-production-rw.fsn1.tailnet.nxua.ts.net
        user: streaming_replica
        sslmode: require
      password:
        name: cnpg-replication
        key: password
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://nexora-cnpg-backups-authentik-production-nbg1/"
      endpointURL: "https://nbg1.your-objectstorage.com"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2
