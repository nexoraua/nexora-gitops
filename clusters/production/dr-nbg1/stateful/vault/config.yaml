# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Vault platform config (ingress + OIDC bootstrap job) — DR copy.
# Points at the regional Vault path prefix kv/nexora/production-nbg1/.
# Runs after Authentik (sync-wave 4); the OIDC bootstrap job lives under
# platform/vault/_pending-authentik-oidc/ until the regional Authentik
# OIDC provider exists on auth-nbg1.nxua.dev.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-config-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: apps
  source:
    repoURL: https://github.com/nexoraua/nexora-gitops.git
    targetRevision: main
    path: clusters/production/dr-nbg1/platform/vault
  destination:
    name: production-nbg1
    namespace: vault-system
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
