# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Dragonfly cluster — NBG1 cold standby. replicas: 0 in scaffold; flip to
# 3 on activation. Cache layer is non-authoritative state — recreated
# empty on activation, no cross-region replication.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: nexora-cache
  namespace: dragonfly
spec:
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.24.0
  replicas: 0   # COLD: flip to 3 on activation
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 3Gi
  args:
    - --maxmemory=2gb
    - --proactor_threads=4
    - --snapshot_cron=0 */4 * * *
    - --cluster_mode=emulated
    - --dir=/data
  snapshot:
    cron: "0 */4 * * *"
    persistentVolumeClaimSpec:
      storageClassName: linstor-r1
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: nexora-cache
              app.kubernetes.io/part-of: dragonfly
          topologyKey: kubernetes.io/hostname
