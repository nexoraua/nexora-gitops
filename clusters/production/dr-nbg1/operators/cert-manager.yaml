# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# cert-manager — DR copy. replicaCount=0 across controller/webhook/cainjector
# at scaffold; flip each to 2 on activation. ClusterIssuers in
# platform/cert-manager/issuers.yaml reuse the same letsencrypt-prod issuer
# name as FSN1 (DNS-01 zone unchanged: nxua.dev).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.18.2
      helm:
        values: |
          installCRDs: true
          # COLD: flip to 2 on activation.
          replicaCount: 0
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          nodeSelector:
            nodepool: system
          tolerations:
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: cert-manager
                  topologyKey: kubernetes.io/hostname
          webhook:
            # COLD: flip to 2 on activation.
            replicaCount: 0
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            nodeSelector:
              nodepool: system
            tolerations:
              - key: nodepool
                operator: Equal
                value: system
                effect: NoSchedule
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: webhook
                    topologyKey: kubernetes.io/hostname
          cainjector:
            # COLD: flip to 2 on activation.
            replicaCount: 0
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            nodeSelector:
              nodepool: system
            tolerations:
              - key: nodepool
                operator: Equal
                value: system
                effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
    - repoURL: https://github.com/nexoraua/nexora-gitops.git
      targetRevision: main
      path: clusters/production/dr-nbg1/platform/cert-manager
  destination:
    name: production-nbg1
    namespace: cert-manager
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
