# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# External Secrets Operator — DR copy. replicaCount=0 across controller /
# webhook / certController; flip each to 2 on activation. All ExternalSecret
# manifests in dr-nbg1/platform/secrets/ target the regional Vault path
# prefix kv/nexora/production-nbg1/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7
    helm:
      values: |
        installCRDs: true
        # COLD: flip to 2 on activation.
        replicaCount: 0
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        nodeSelector:
          nodepool: system
        tolerations:
          - key: nodepool
            operator: Equal
            value: system
            effect: NoSchedule
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: external-secrets
                topologyKey: kubernetes.io/hostname
        webhook:
          port: 9443
          # COLD: flip to 2 on activation.
          replicaCount: 0
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          nodeSelector:
            nodepool: system
          tolerations:
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: external-secrets-webhook
                  topologyKey: kubernetes.io/hostname
        certController:
          # COLD: flip to 2 on activation.
          replicaCount: 0
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          nodeSelector:
            nodepool: system
          tolerations:
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
  destination:
    name: production-nbg1
    namespace: external-secrets
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
