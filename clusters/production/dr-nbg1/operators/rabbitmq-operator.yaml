# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# RabbitMQ Cluster Operator — DR copy. Operator is a kustomize bundle (no
# replicas knob); destination flipped to production-nbg1. The parent
# Application in apps/dr-nbg1.yaml is INTENTIONALLY ABSENT day-1, so this
# manifest is committed but never reconciles until activation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-operator-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  source:
    repoURL: https://github.com/rabbitmq/cluster-operator.git
    targetRevision: v2.21.0
    path: config/installation
  destination:
    name: production-nbg1
    namespace: rabbitmq-system
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
