# Passive Traefik edge for NBG1 cold standby.
# replicas: 0 — does nothing until DR flip.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-nbg1
spec:
  replicas: 0   # COLD: flip to 2 on activation
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      nodeSelector:
        nodepool: system
      tolerations:
        - key: nodepool
          operator: Equal
          value: system
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: traefik
              topologyKey: kubernetes.io/hostname
      containers:
        - name: traefik
          image: traefik:v3.2.1
          args:
            - --entrypoints.web.address=:8000
            - --entrypoints.websecure.address=:8443
            - --providers.kubernetescrd
            - --providers.kubernetesingress
            - --metrics.prometheus=true
          ports:
            - name: web
              containerPort: 8000
            - name: websecure
              containerPort: 8443
            - name: metrics
              containerPort: 9100
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-nbg1
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: web
      port: 80
      targetPort: 8000
    - name: websecure
      port: 443
      targetPort: 8443
