# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Authentik CNPG replica wrapper — Application points at the regional
# stateful/authentik/ directory which holds the nexora-authentik-
# production-nbg1 streaming replica (instances=0 at scaffold).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik-db-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: data
  source:
    repoURL: https://github.com/nexoraua/nexora-gitops.git
    targetRevision: main
    path: clusters/production/dr-nbg1/stateful/authentik
  destination:
    name: production-nbg1
    namespace: authentik
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
