# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# VictoriaMetrics — DR copy. Single-region mode for NBG1 (no cross-region
# vmcluster federation day-1). Same chart pin + HA shape as FSN1; the
# parent Application in apps/dr-nbg1.yaml is intentionally absent day-1
# so effective replicas stay at 0.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: observability
  source:
    repoURL: https://victoriametrics.github.io/helm-charts
    chart: victoria-metrics-k8s-stack
    targetRevision: 0.30.0
    helm:
      releaseName: vm
      values: |
        nameOverride: vm
        fullnameOverride: vm
        victoria-metrics-operator:
          admissionWebhooks:
            certManager:
              enabled: true
        grafana:
          enabled: false
        defaultRules:
          create: true
        kubeStateMetrics:
          enabled: true
        kube-state-metrics:
          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
          # COLD: flip to 2 on activation.
          replicas: 0
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: kube-state-metrics
                  topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 384Mi
        nodeExporter:
          enabled: true
        prometheus-node-exporter:
          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9100"
          tolerations:
            - operator: Exists
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 128Mi
        kubeApiServer:
          enabled: false
        kubelet:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        coreDns:
          enabled: false
        kubeDns:
          enabled: false
        vmcluster:
          enabled: true
          spec:
            retentionPeriod: "13"
            replicationFactor: 2
            vmstorage:
              # COLD: flip to 3 on activation.
              replicaCount: 0
              podDisruptionBudget:
                maxUnavailable: 1
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: vmstorage
                      topologyKey: kubernetes.io/hostname
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: linstor-r1
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 100Gi
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                limits:
                  memory: 4Gi
            vmselect:
              # COLD: flip to 2 on activation.
              replicaCount: 0
              cacheMountPath: /select-cache
              podDisruptionBudget:
                maxUnavailable: 1
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: vmselect
                      topologyKey: kubernetes.io/hostname
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: linstor-r1
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 20Gi
              resources:
                requests:
                  cpu: 300m
                  memory: 1Gi
                limits:
                  memory: 2Gi
            vminsert:
              # COLD: flip to 2 on activation.
              replicaCount: 0
              podDisruptionBudget:
                maxUnavailable: 1
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: vminsert
                      topologyKey: kubernetes.io/hostname
              resources:
                requests:
                  cpu: 300m
                  memory: 512Mi
                limits:
                  memory: 1Gi
        vmagent:
          enabled: false
        vmalert:
          enabled: true
          spec:
            # COLD: flip to 2 on activation.
            replicaCount: 0
            podDisruptionBudget:
              maxUnavailable: 1
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: vmalert
                    topologyKey: kubernetes.io/hostname
            datasource:
              url: "http://vmselect-vm.monitoring.svc:8481/select/0/prometheus/"
            notifier:
              url: "http://vmalertmanager-vm.monitoring.svc:9093/"
        vmalertmanager:
          enabled: true
          spec:
            # COLD: flip to 2 on activation.
            replicaCount: 0
            podDisruptionBudget:
              maxUnavailable: 1
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: vmalertmanager
                    topologyKey: kubernetes.io/hostname
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: linstor-r1
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
            configSecret: alertmanager-config
        vmsingle:
          enabled: false
  destination:
    name: production-nbg1
    namespace: monitoring
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
