# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# VMRule loader for the NBG1 monitoring namespace. Pulls in cnpg-backup-
# alerts + dr-sync-alerts from dr-nbg1/platform/monitoring/. Cluster
# label retargeted to nexora-production-nbg1 via the regional Alloy
# configmap (logs/metrics already carry cluster=production-nbg1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-rules-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: observability
  source:
    repoURL: https://github.com/nexoraua/nexora-gitops.git
    targetRevision: main
    path: clusters/production/dr-nbg1/platform/monitoring
  destination:
    name: production-nbg1
    namespace: monitoring
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
