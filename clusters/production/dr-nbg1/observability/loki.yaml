# DR scaffold — inactive until activation. See clusters/production/dr-nbg1/README.md.
#
# Loki — DR copy. Object storage retargeted to nexora-loki-production-nbg1
# on the Hetzner NBG1 endpoint. Identical SimpleScalable shape as FSN1.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-nbg1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.20.0
    helm:
      values: |
        deploymentMode: SimpleScalable
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 3
          storage:
            type: s3
            s3:
              endpoint: nbg1.your-objectstorage.com
              region: nbg1
              s3ForcePathStyle: true
              insecure: false
            bucketNames:
              chunks: nexora-loki-production-nbg1
              ruler: nexora-loki-production-nbg1
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          pattern_ingester:
            enabled: false
          ruler:
            enable_api: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 2160h    # 90 d
          compactor:
            retention_enabled: true
            delete_request_store: s3
        loki.storage.s3.secret_access_key: ""
        loki.storage.s3.access_key_id: ""
        read:
          # COLD: flip to 3 on activation.
          replicas: 0
          persistence:
            storageClass: linstor-r1
            size: 10Gi
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: read
                  topologyKey: kubernetes.io/hostname
          extraEnvFrom:
            - secretRef:
                name: loki-s3
        write:
          # COLD: flip to 3 on activation.
          replicas: 0
          persistence:
            storageClass: linstor-r1
            size: 20Gi
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: write
                  topologyKey: kubernetes.io/hostname
          extraEnvFrom:
            - secretRef:
                name: loki-s3
        backend:
          # COLD: flip to 3 on activation.
          replicas: 0
          persistence:
            storageClass: linstor-r1
            size: 10Gi
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: backend
                  topologyKey: kubernetes.io/hostname
          extraEnvFrom:
            - secretRef:
                name: loki-s3
        gateway:
          enabled: true
          # COLD: flip to 2 on activation.
          replicas: 0
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: gateway
                  topologyKey: kubernetes.io/hostname
        chunksCache:
          enabled: true
          # COLD: flip to 2 on activation.
          replicas: 0
        resultsCache:
          enabled: true
          # COLD: flip to 2 on activation.
          replicas: 0
        singleBinary:
          replicas: 0
        test:
          enabled: false
        ingester:
          replicas: 0
        distributor:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        indexGateway:
          replicas: 0
        compactor:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
  destination:
    name: production-nbg1
    namespace: monitoring
  # syncPolicy.automated omitted intentionally — parent dr-nbg1 Application
  # is manual-sync; child Applications must inherit that gate so DR
  # activation stays a deliberate, auditable click.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
