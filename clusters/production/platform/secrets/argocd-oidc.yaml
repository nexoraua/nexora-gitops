# ArgoCD OIDC client credentials — Authentik provider "argocd".
# Merged into the existing argocd-secret (creationPolicy=Merge), with an
# empty template metadata so ArgoCD's tracking-id annotation doesn't
# leak onto argocd-secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    template:
      metadata: {}
  data:
    - secretKey: oidc.authentik.clientID
      remoteRef:
        key: nexora/production/oidc/argocd
        property: client_id
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: nexora/production/oidc/argocd
        property: client_secret
