# Hetzner Object Storage credentials for CNPG primary backups.
# Materialized into both postgresql and authentik namespaces because the
# Hetzner project key reaches both backup buckets
# (nexora-cnpg-backups-production + nexora-cnpg-backups-authentik-production).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/production/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production/cnpg/backup-s3
        property: secret-access-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/production/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production/cnpg/backup-s3
        property: secret-access-key
