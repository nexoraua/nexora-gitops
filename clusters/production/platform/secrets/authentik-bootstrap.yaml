# Authentik bootstrap secrets — secret_key, initial admin password,
# postgres password injection.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-bootstrap
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: authentik-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: nexora/production/authentik/bootstrap
        property: secret_key
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: nexora/production/authentik/bootstrap
        property: bootstrap_admin_password
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: nexora/production/authentik/bootstrap
        property: bootstrap_admin_token
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: nexora/production/authentik/postgres
        property: password
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: nexora/production/authentik/postgres
        property: password
