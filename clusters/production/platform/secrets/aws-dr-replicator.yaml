# AWS DR replicator credentials — used by the cross-cloud rclone CronJobs
# (cnpg-business-dr-sync + cnpg-authentik-dr-sync) to write to the
# immutable AWS S3 buckets per ADR-I-0005.
#
# IAM user nexora-cnpg-dr-replicator has a tight policy:
#   - s3:PutObject, s3:PutObjectRetention, s3:PutObjectLegalHold on
#     arn:aws:s3:::nexora-cnpg-backups-production-dr/* and
#     arn:aws:s3:::nexora-cnpg-backups-authentik-production-dr/*
#   - kms:GenerateDataKey, kms:Encrypt on alias/nexora-backups-production
#   - NO Delete, NO bucket-level configuration writes.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-dr-replicator
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: aws-dr-replicator
    creationPolicy: Owner
  data:
    - secretKey: access_key_id
      remoteRef:
        key: nexora/production/aws/dr-replicator
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: nexora/production/aws/dr-replicator
        property: secret_access_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-dr-replicator
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: aws-dr-replicator
    creationPolicy: Owner
  data:
    - secretKey: access_key_id
      remoteRef:
        key: nexora/production/aws/dr-replicator
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: nexora/production/aws/dr-replicator
        property: secret_access_key
