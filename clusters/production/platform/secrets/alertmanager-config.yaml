# Alertmanager config — routes for Slack (warn+info) + PagerDuty (critical).
# Webhook + integration key come from Vault; ESO materialises the
# alertmanager-config Secret consumed by the vmalertmanager spec
# (configSecret: alertmanager-config in apps/victoria-metrics.yaml).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
            slack_api_url: '{{ .slack_webhook }}'
          route:
            receiver: slack-default
            group_by: ['alertname', 'cluster', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - matchers:
                  - severity = "critical"
                receiver: pagerduty
                continue: true
              - matchers:
                  - severity = "critical"
                receiver: slack-critical
          receivers:
            - name: slack-default
              slack_configs:
                - channel: '#nexora-alerts'
                  send_resolved: true
                  title: '{{ "{{" }} .CommonLabels.alertname {{ "}}" }} ({{ "{{" }} .Status {{ "}}" }})'
                  text: '{{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}'
            - name: slack-critical
              slack_configs:
                - channel: '#nexora-alerts-critical'
                  send_resolved: true
            - name: pagerduty
              pagerduty_configs:
                - routing_key: '{{ .pagerduty_key }}'
                  send_resolved: true
  data:
    - secretKey: slack_webhook
      remoteRef:
        key: nexora/production/alerts/slack
        property: webhook_url
    - secretKey: pagerduty_key
      remoteRef:
        key: nexora/production/alerts/pagerduty
        property: integration_key
