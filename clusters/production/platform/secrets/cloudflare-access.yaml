# Cloudflare Access — CF_ACCESS_AUD + team-domain consumed by the
# cf-access-validator service in the traefik namespace (the validator
# behind the cloudflare-jwt-assertion forwardAuth middleware).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-access
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cloudflare-access
    creationPolicy: Owner
  data:
    - secretKey: CF_ACCESS_AUD
      remoteRef:
        key: nexora/production/cloudflare-access
        property: aud
    - secretKey: CF_ACCESS_TEAM_DOMAIN
      remoteRef:
        key: nexora/production/cloudflare-access
        property: team-domain
