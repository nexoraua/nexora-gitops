# Grafana OIDC client credentials — Authentik provider "grafana".
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-id
      remoteRef:
        key: nexora/production/oidc/grafana
        property: client_id
    - secretKey: oidc-client-secret
      remoteRef:
        key: nexora/production/oidc/grafana
        property: client_secret
