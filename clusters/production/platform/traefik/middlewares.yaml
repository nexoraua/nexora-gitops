# Shared Traefik middlewares applied across production IngressRoutes.
# Per-route attachment is in each app's ingress manifest.
---
# Per-IP rate limit on the public edge. Average 100 req/s with a burst
# of 200 — tuned for the public API + admin login surface; private
# internal traffic bypasses this middleware.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-global
  namespace: traefik
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1   # behind Cloudflare; trust the CF-Connecting-IP header
---
# Per-IP auth-tier rate limit. Stricter than the global limiter —
# attached to api IngressRoutes so brute-force on login / register /
# OTP is throttled at the edge (5 req / IP / minute, no burst).
# Defense in depth with the .NET rate limiter (auth-tier policy
# inside Nexora.Api).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-api
  namespace: traefik
spec:
  rateLimit:
    average: 30        # 30 req/s sustained
    burst: 60          # short burst for legitimate traffic
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
---
# Secure HTTP headers: HSTS preload, no-sniff, frame-deny, strict
# referrer, CSP default-src 'self'. Applied to UI hosts (admin, grafana,
# argocd) — and now also to api.nxua.dev (S13b launch hardening —
# audit found api host had no edge headers; CSP / referrer-policy
# layer in front of the app-level Nexora.Api.Security middleware).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: traefik
spec:
  headers:
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: strict-origin-when-cross-origin
    frameDeny: true
    customResponseHeaders:
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
      X-Content-Type-Options: nosniff
