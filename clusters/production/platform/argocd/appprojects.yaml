# ArgoCD AppProjects — namespace/source isolation for production cluster.
# Root app stays in 'default' project (manages Application CRDs in argocd ns).
#
# DR destinations (production-nbg1, production-hel1) are listed alongside
# the FSN1 in-cluster destination. They are by-name references; until the
# corresponding cluster Secret labelled argocd.argoproj.io/secret-type=cluster
# is created in the central FSN1 argocd ns (Phase 3 of the DR activation
# runbook), Argo CD refuses to sync Applications that target them — adding
# them here does NOT cause any reconciliation at day-1. Per-region nested
# Applications under clusters/production/dr-{nbg1,hel1}/ reference these
# project names (platform / data / apps / observability), so each project
# must allow both DR cluster destinations or the activation diff fails.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Infrastructure, operators, and cross-cutting platform resources
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
    - https://bitnami-labs.github.io/sealed-secrets
    - https://charts.jetstack.io
    - https://traefik.github.io/charts
    - https://cloudnative-pg.github.io/charts
    - https://github.com/dragonflydb/dragonfly-operator.git
    - https://charts.external-secrets.io
    - https://helm.releases.hashicorp.com
    - https://argoproj.github.io/argo-helm
    - https://charts.hetzner.cloud
    - https://github.com/rabbitmq/cluster-operator.git
    - https://github.com/piraeusdatastore/piraeus-operator.git
    - https://kubernetes-sigs.github.io/metrics-server
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
    # DR clusters (by name) — see DR activation runbooks.
    - name: production-nbg1
      namespace: '*'
    - name: production-hel1
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data
  namespace: argocd
spec:
  description: Stateful workload clusters managed by operators
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: postgresql
    - server: https://kubernetes.default.svc
      namespace: rabbitmq
    - server: https://kubernetes.default.svc
      namespace: dragonfly
    - server: https://kubernetes.default.svc
      namespace: authentik
    # DR clusters (by name) — same stateful namespaces.
    - name: production-nbg1
      namespace: postgresql
    - name: production-nbg1
      namespace: rabbitmq
    - name: production-nbg1
      namespace: dragonfly
    - name: production-nbg1
      namespace: authentik
    - name: production-hel1
      namespace: postgresql
    - name: production-hel1
      namespace: rabbitmq
    - name: production-hel1
      namespace: dragonfly
    - name: production-hel1
      namespace: authentik
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # CronJob is a namespaced resource (group=batch, kind=CronJob); listing
  # it under clusterResourceWhitelist is a no-op and silently disables
  # CronJob sync. Explicit namespaceResourceWhitelist entries below would
  # already cover it via the wildcard, but we keep it called out so the
  # data project's backup/maintenance CronJobs (CNPG base backups,
  # snapshot reaping) are deliberately authorised.
  namespaceResourceWhitelist:
    - group: batch
      kind: CronJob
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: VictoriaMetrics, Grafana, Loki, Tempo, Alloy, kube-prometheus-stack
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
    - https://victoriametrics.github.io/helm-charts
    - https://grafana.github.io/helm-charts
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: kube-system
    # DR clusters (by name) — same observability namespaces.
    - name: production-nbg1
      namespace: monitoring
    - name: production-nbg1
      namespace: kube-system
    - name: production-hel1
      namespace: monitoring
    - name: production-hel1
      namespace: kube-system
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: Authentik (central IdP), Vault, Nexora services
  sourceRepos:
    - https://github.com/nexoraua/nexora-gitops.git
    - https://charts.goauthentik.io
    - https://helm.releases.hashicorp.com
  destinations:
    - server: https://kubernetes.default.svc
      namespace: authentik
    - server: https://kubernetes.default.svc
      namespace: vault-system
    - server: https://kubernetes.default.svc
      namespace: nexora-api
    - server: https://kubernetes.default.svc
      namespace: nexora-admin
    - server: https://kubernetes.default.svc
      namespace: nexora-frontend
    # Vault bootstrap manifests include a Traefik Middleware (Cloudflare
    # Access JWT assertion) that lives in the traefik ns, and a cluster-
    # scoped ClusterSecretStore for ESO->Vault.
    - server: https://kubernetes.default.svc
      namespace: traefik
    # DR clusters (by name) — same apps namespaces.
    - name: production-nbg1
      namespace: authentik
    - name: production-nbg1
      namespace: vault-system
    - name: production-nbg1
      namespace: nexora-api
    - name: production-nbg1
      namespace: nexora-admin
    - name: production-nbg1
      namespace: nexora-frontend
    - name: production-nbg1
      namespace: traefik
    - name: production-hel1
      namespace: authentik
    - name: production-hel1
      namespace: vault-system
    - name: production-hel1
      namespace: nexora-api
    - name: production-hel1
      namespace: nexora-admin
    - name: production-hel1
      namespace: nexora-frontend
    - name: production-hel1
      namespace: traefik
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: external-secrets.io
      kind: ClusterSecretStore
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
