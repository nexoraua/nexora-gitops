# PodDisruptionBudgets for the monitoring stack.
# VM cluster PDBs (vmstorage/vmselect/vminsert/vmalert/vmalertmanager) are
# managed by the VictoriaMetrics chart values directly — see
# apps/victoria-metrics.yaml. This file covers Loki, Tempo, Grafana,
# Authentik server/worker which the apps don't always pin.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-read-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: read
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-write-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: write
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-backend-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-gateway-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tempo-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grafana-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
# No PDB for Alloy DaemonSet: DaemonSets don't implement the scale
# subresource — the PDB controller can't evaluate. The Alloy OTLP
# gateway StatefulSet gets its own PDB below.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alloy-otlp-gateway-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: alloy-otlp-gateway
