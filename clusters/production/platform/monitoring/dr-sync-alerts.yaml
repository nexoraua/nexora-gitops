# Alerting rules for the cross-cloud DR sync CronJobs (ADR-I-0005).
# Targets the CronJob completion + lag metrics emitted by kube-state-metrics.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: cnpg-dr-sync-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: nexora
    nexora.io/component: cnpg-dr
spec:
  groups:
    - name: cnpg-dr-sync
      rules:
        # The last business DR sync run failed.
        - alert: CNPGDRSyncBusinessFailed
          expr: kube_job_status_failed{job_name=~"cnpg-business-dr-sync.*"} > 0
          for: 10m
          labels:
            severity: critical
            component: cnpg-dr
          annotations:
            summary: "Business CNPG DR sync to AWS S3 failed (immutable copy lagging)"
            description: >-
              The last cnpg-business-dr-sync Job did not complete
              successfully. The immutable AWS S3 copy is no longer
              advancing — ADR-I-0005 compliance window is at risk.

        # The last authentik DR sync run failed.
        - alert: CNPGDRSyncAuthentikFailed
          expr: kube_job_status_failed{job_name=~"cnpg-authentik-dr-sync.*"} > 0
          for: 10m
          labels:
            severity: critical
            component: cnpg-dr
          annotations:
            summary: "Authentik CNPG DR sync to AWS S3 failed"
            description: >-
              The last cnpg-authentik-dr-sync Job did not complete
              successfully.

        # No successful DR sync run in the last 28h.
        - alert: CNPGDRSyncBusinessStale
          expr: |
            time() - max(
              kube_job_status_completion_time{job_name=~"cnpg-business-dr-sync.*"}
              and on(job_name) kube_job_status_succeeded{job_name=~"cnpg-business-dr-sync.*"} > 0
            ) > 28 * 3600
          for: 1h
          labels:
            severity: critical
            component: cnpg-dr
          annotations:
            summary: "Business CNPG DR sync has not succeeded in 28h"
            description: >-
              No successful cnpg-business-dr-sync run in over 28h. The
              immutable AWS S3 copy is stale.
