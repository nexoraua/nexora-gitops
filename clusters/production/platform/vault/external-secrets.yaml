# ClusterSecretStore pointing at Vault KV (after Vault is unsealed).
# Used to materialize secrets that other workloads need as Kubernetes
# Secret resources.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: http://vault.vault-system.svc:8200
      path: kv
      version: v2
      # In-cluster TLS is disabled — Cilium WireGuard encrypts node-to-node
      # traffic. Production keeps this in the same shape as develop because
      # the perimeter (Traefik/CF Access) is what terminates external TLS;
      # the in-cluster fabric is already encrypted at L3.
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
