# Default-deny ingress AND egress for every stateful + platform namespace.
# Explicit allow rules live next to the workloads that need them
# (stateful-egress.yaml, platform-egress-deny.yaml, vault-allow.yaml,
# dragonfly-allow.yaml).
#
# Tailscale namespace is intentionally NOT default-denied — the subnet
# router is an L3 forwarder; a NetworkPolicy on it fights its purpose
# and risks lockout.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: postgresql
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
