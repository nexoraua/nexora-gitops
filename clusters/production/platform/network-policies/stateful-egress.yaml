---
# DR replicator CronJob pods (rclone) — egress to Hetzner (read) AND
# AWS S3 + KMS (write). Selected by the app.kubernetes.io/name=cnpg-dr-sync
# label set in the CronJob template.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-dr-sync-egress
  namespace: postgresql
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cnpg-dr-sync
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "fsn1.your-objectstorage.com"
        - matchPattern: "*.fsn1.your-objectstorage.com"
        - matchName: "s3.eu-central-1.amazonaws.com"
        - matchPattern: "*.s3.eu-central-1.amazonaws.com"
        - matchName: "kms.eu-central-1.amazonaws.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-dr-sync-egress
  namespace: authentik
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cnpg-dr-sync
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
