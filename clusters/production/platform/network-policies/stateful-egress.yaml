# Baseline egress allows for the stateful namespaces.
# Every namespace with default-deny-all needs at minimum:
#   - DNS to kube-dns (so service names resolve)
#   - kube-apiserver (so operator-injected init containers can read CRDs)
# This file covers the postgresql / dragonfly / rabbitmq namespaces.
# Per-pod ingress allows live next to the workload manifest where
# applicable (dragonfly-allow.yaml, vault-allow.yaml).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: postgresql
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: postgresql
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
