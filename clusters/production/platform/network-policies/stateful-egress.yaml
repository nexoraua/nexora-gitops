# CNPG instance peer + monitoring + app + DR-sync egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-peer
  namespace: postgresql
spec:
  podSelector:
    matchLabels:
      cnpg.io/podRole: instance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9187
          protocol: TCP
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-peer
  namespace: rabbitmq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nexora-rabbitmq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nexora-rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 4369
          protocol: TCP
        - port: 25672
          protocol: TCP
        - port: 15672
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rabbitmq-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 15672
          protocol: TCP
        - port: 15692
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 5672
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nexora-rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 4369
          protocol: TCP
        - port: 25672
          protocol: TCP
        - port: 15672
          protocol: TCP
---
# CNPG pods + restore/backup Jobs need egress to Hetzner Object Storage
# (the WAL + base backup destination). Selecting on cnpg.io/cluster
# (Exists) covers BOTH the cnpg.io/podRole=instance pods AND the
# cnpg.io/jobRole=* Job pods used by restores — without the latter, a
# restore fails with "Could not connect to the endpoint URL". This is
# the develop-cluster restore-drill fix applied here at day-1.
# DR sync rclone CronJob pods are NOT selected here (no cnpg.io label);
# they have a separate policy below.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-object-storage
  namespace: postgresql
spec:
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "fsn1.your-objectstorage.com"
        - matchPattern: "*.fsn1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
