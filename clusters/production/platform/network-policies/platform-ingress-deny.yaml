# Ingress allowlists for platform namespaces under default-deny.
# Each NetworkPolicy below has podSelector: {} + policyTypes: [Ingress],
# so only the listed `from` sources can connect to pods in that
# namespace. Egress lockdown is in platform-egress-deny.yaml.
#
# Common allowances:
#   - intra-namespace: pods in a namespace trust each other.
#   - from monitoring: Alloy DaemonSet scrapes pod metrics cluster-wide.
# Webhook namespaces additionally allow ingress from kube-apiserver via
# a CiliumNetworkPolicy (kube-apiserver is not selectable by a plain
# NetworkPolicy) — without it, failurePolicy=Fail webhooks would break
# every CRD write.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
    # CNPG operator manages the co-located authentik Postgres cluster.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
    # App namespaces (nexora-api / nexora-admin) push OTLP traces to
    # the Alloy otlp-gateway StatefulSet on 4317/4318.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Public entrypoints — 8000 (web) and 8443 (websecure) reachable
    # from anywhere; the Hetzner LB rewrites destination IP to the
    # Traefik pod IP and Cilium honours that.
    - ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
---
# kube-apiserver -> admission webhook ingress (Cilium named entity).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ingress-apiserver-webhook
  namespace: cert-manager
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ingress-apiserver-webhook
  namespace: external-secrets
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ingress-apiserver-webhook
  namespace: monitoring
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
