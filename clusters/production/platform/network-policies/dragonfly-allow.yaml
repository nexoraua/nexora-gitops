# Redis-protocol ingress to Dragonfly from app namespaces that consume
# it. Without this, authentik / nexora-api / nexora-admin cannot reach
# nexora-cache:6379 because the dragonfly ns has default-deny-all.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonfly-cache-ingress
  namespace: dragonfly
spec:
  # Cilium's default labelPrefixFile excludes the plain `app` label
  # from endpoint identities — match the standard label instead.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dragonfly
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 6379
          protocol: TCP
    # The Dragonfly Operator drives leader election + replication via
    # the admin port 9999. Without this allow, it can't run "SLAVE OF
    # NO ONE" on the pod, never labels the pod role=master, and the
    # Service ends up with zero endpoints — every client connection
    # gets EPERM from Cilium's socket LB.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dragonfly-system
      ports:
        - port: 6379
          protocol: TCP
        - port: 9999
          protocol: TCP
---
# Dragonfly egress: peer replication + operator probes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonfly-cache-egress-peer
  namespace: dragonfly
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dragonfly
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: dragonfly
      ports:
        - port: 6379
          protocol: TCP
        - port: 9999
          protocol: TCP
