# Cross-cloud immutable DR copy for the business CNPG backups (ADR-I-0005).
#
# Why this exists:
#   - barman writes a MUTABLE primary copy to Hetzner Object Storage
#     (nexora-cnpg-backups-production) — Hetzner Object Lock GOVERNANCE
#     mode does NOT give trustworthy WORM (a delete_object without
#     BypassGovernanceRetention still succeeds), so Hetzner alone cannot
#     satisfy the fintech immutability requirement.
#   - This CronJob runs rclone on a schedule to mirror new objects to
#     an AWS S3 bucket (nexora-cnpg-backups-production-dr) in
#     eu-central-1, with Object Lock COMPLIANCE 35 d + SSE-KMS using
#     alias/nexora-backups-production. COMPLIANCE mode prevents deletion
#     even by the AWS account root for the duration of the retention.
#
# Wiring once secrets land:
#   - kv/nexora/production/cnpg/backup-s3      -> Hetzner SOURCE creds
#   - kv/nexora/production/aws/dr-replicator   -> AWS DR creds (IAM user
#     nexora-cnpg-dr-replicator with s3:PutObject + s3:PutObjectRetention
#     + s3:PutObjectLegalHold on the target bucket only; KMS Encrypt on
#     the SSE-KMS key)
# Both come in as Kubernetes Secrets via ESO (see platform/secrets/).
#
# Schedule: 06:00 daily — runs ~4h after the primary base backup at 02:00,
# enough headroom for a multi-GB WAL + base to land on Hetzner before we
# mirror. Production base backups now sit in the earliest 02:00–03:00 slot
# so the DR mirror window starts well clear of any in-flight backup
# upload from dev/staging.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-dr-replicator
  namespace: postgresql
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-business-dr-sync
  namespace: postgresql
  labels:
    app.kubernetes.io/part-of: nexora
    nexora.io/component: cnpg-dr
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 21600     # 6 h hard ceiling per run
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cnpg-dr-sync
            cluster: nexora-business-production
        spec:
          serviceAccountName: cnpg-dr-replicator
          restartPolicy: OnFailure
          # Pin to a database node so the rclone job sits next to the
          # data it reads (the barman backups are in Hetzner object
          # storage, but Hetzner peering keeps egress cheap from the
          # FSN1 region).
          tolerations:
            - key: nodepool
              operator: Equal
              value: database
              effect: NoSchedule
          nodeSelector:
            nodepool: database
          containers:
            - name: rclone
              image: rclone/rclone:1.69
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  # rclone copy with checksum mode + immutable flags:
                  # --s3-object-lock-mode COMPLIANCE
                  # --s3-object-lock-retain-until <now + 35d>
                  RETAIN_UNTIL=$(date -u -d "+35 days" +%Y-%m-%dT%H:%M:%SZ)
                  rclone copy \
                    hetzner:nexora-cnpg-backups-production \
                    aws:nexora-cnpg-backups-production-dr \
                    --checksum \
                    --transfers 8 \
                    --checkers 16 \
                    --s3-no-check-bucket \
                    --s3-chunk-size 64M \
                    --s3-upload-concurrency 4 \
                    --s3-server-side-encryption aws:kms \
                    --s3-sse-kms-key-id alias/nexora-backups-production \
                    --s3-object-lock-mode COMPLIANCE \
                    --s3-object-lock-retain-until "$RETAIN_UNTIL" \
                    --log-level INFO
              env:
                # Source: Hetzner Object Storage (FSN1).
                - name: RCLONE_CONFIG_HETZNER_TYPE
                  value: s3
                - name: RCLONE_CONFIG_HETZNER_PROVIDER
                  value: Other
                - name: RCLONE_CONFIG_HETZNER_ENDPOINT
                  value: https://fsn1.your-objectstorage.com
                - name: RCLONE_CONFIG_HETZNER_REGION
                  value: fsn1
                - name: RCLONE_CONFIG_HETZNER_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cnpg-backup-s3
                      key: ACCESS_KEY_ID
                - name: RCLONE_CONFIG_HETZNER_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cnpg-backup-s3
                      key: SECRET_ACCESS_KEY
                # Destination: AWS S3 (eu-central-1) immutable copy.
                - name: RCLONE_CONFIG_AWS_TYPE
                  value: s3
                - name: RCLONE_CONFIG_AWS_PROVIDER
                  value: AWS
                - name: RCLONE_CONFIG_AWS_REGION
                  value: eu-central-1
                - name: RCLONE_CONFIG_AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-dr-replicator
                      key: access_key_id
                - name: RCLONE_CONFIG_AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-dr-replicator
                      key: secret_access_key
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  memory: 2Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: rclone-config
                  mountPath: /config/rclone
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
            - name: rclone-config
              emptyDir:
                sizeLimit: 1Mi
