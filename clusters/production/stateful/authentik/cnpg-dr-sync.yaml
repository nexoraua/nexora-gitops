# Cross-cloud immutable DR copy for the Authentik CNPG backups (ADR-I-0005).
# Mirror logic identical to the business sync — see
# clusters/production/stateful/postgresql/cnpg-dr-sync.yaml for the full
# rationale (Hetzner Object Lock GOVERNANCE is weak; AWS S3 COMPLIANCE
# Object Lock + SSE-KMS gives trustworthy WORM).
#
# Schedule: 06:00 daily (aligned with the business sync — both DR jobs
# now share the same window; rclone concurrency on each is small enough
# that egress bandwidth from the database pool is not contended).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-dr-replicator
  namespace: authentik
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-authentik-dr-sync
  namespace: authentik
  labels:
    app.kubernetes.io/part-of: nexora
    nexora.io/component: cnpg-dr
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cnpg-dr-sync
            cluster: nexora-authentik-production
        spec:
          serviceAccountName: cnpg-dr-replicator
          restartPolicy: OnFailure
          tolerations:
            - key: nodepool
              operator: Equal
              value: database
              effect: NoSchedule
          nodeSelector:
            nodepool: database
          containers:
            - name: rclone
              image: rclone/rclone:1.69
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  RETAIN_UNTIL=$(date -u -d "+35 days" +%Y-%m-%dT%H:%M:%SZ)
                  rclone copy \
                    hetzner:nexora-cnpg-backups-authentik-production \
                    aws:nexora-cnpg-backups-authentik-production-dr \
                    --checksum \
                    --transfers 4 \
                    --checkers 8 \
                    --s3-no-check-bucket \
                    --s3-chunk-size 32M \
                    --s3-upload-concurrency 4 \
                    --s3-server-side-encryption aws:kms \
                    --s3-sse-kms-key-id alias/nexora-backups-production \
                    --s3-object-lock-mode COMPLIANCE \
                    --s3-object-lock-retain-until "$RETAIN_UNTIL" \
                    --log-level INFO
              env:
                - name: RCLONE_CONFIG_HETZNER_TYPE
                  value: s3
                - name: RCLONE_CONFIG_HETZNER_PROVIDER
                  value: Other
                - name: RCLONE_CONFIG_HETZNER_ENDPOINT
                  value: https://fsn1.your-objectstorage.com
                - name: RCLONE_CONFIG_HETZNER_REGION
                  value: fsn1
                - name: RCLONE_CONFIG_HETZNER_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cnpg-backup-s3
                      key: ACCESS_KEY_ID
                - name: RCLONE_CONFIG_HETZNER_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cnpg-backup-s3
                      key: SECRET_ACCESS_KEY
                - name: RCLONE_CONFIG_AWS_TYPE
                  value: s3
                - name: RCLONE_CONFIG_AWS_PROVIDER
                  value: AWS
                - name: RCLONE_CONFIG_AWS_REGION
                  value: eu-central-1
                - name: RCLONE_CONFIG_AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-dr-replicator
                      key: access_key_id
                - name: RCLONE_CONFIG_AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-dr-replicator
                      key: secret_access_key
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
