# Grafana Alloy — unified OTel telemetry collector.
# Production runs TWO Alloy deployments:
#   1. DaemonSet on every node — scrapes pod / kubelet / cadvisor metrics
#      and tails container logs (the per-node telemetry path).
#   2. StatefulSet (2 replicas) — dedicated OTLP gateway role that
#      receives app traces from nexora-api / nexora-admin via the
#      otel-gateway Service, so app pods don't hammer per-node DaemonSet
#      Alloys with trace traffic.
#
# Multi-source Application: source 1 is the upstream Helm chart for the
# DaemonSet, source 2 is the chart again for the StatefulSet (separate
# release names), source 3 delivers the shared alloy-config ConfigMap
# from this repo.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alloy
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - role: daemonset
            controller: daemonset
            replicas: "1"
            syncWave: "1"
          - role: otlp-gateway
            controller: statefulset
            replicas: "2"
            syncWave: "1"
  template:
    metadata:
      name: 'alloy-{{role}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
    spec:
      project: observability
      sources:
        - repoURL: https://grafana.github.io/helm-charts
          chart: alloy
          targetRevision: 0.9.2
          helm:
            releaseName: 'alloy-{{role}}'
            values: |
              controller:
                type: {{controller}}
                replicas: {{replicas}}
                tolerations:
                  - operator: Exists
              alloy:
                mounts:
                  varlog: true
                  dockercontainers: true
                configMap:
                  create: false
                  name: alloy-config
                extraPorts:
                  - name: otlp-grpc
                    port: 4317
                    targetPort: 4317
                    protocol: TCP
                  - name: otlp-http
                    port: 4318
                    targetPort: 4318
                    protocol: TCP
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
              crds:
                create: false
        - repoURL: https://github.com/nexoraua/nexora-gitops.git
          targetRevision: main
          path: clusters/production/platform/alloy
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
