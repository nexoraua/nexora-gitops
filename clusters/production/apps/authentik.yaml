# Authentik central IdP — OIDC for admin app, ArgoCD, Grafana, vmui,
# RabbitMQ Management, Vault UI. Upstream OIDC source: Google Workspace.
# Production: 2 server + 2 worker replicas, anti-affinity preferred (not
# required — Authentik tolerates same-node co-tenancy for scale).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: apps
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2024.10.5
    helm:
      values: |
        global:
          envFrom:
            - secretRef:
                name: authentik-bootstrap
        # Native blueprint loader (ROOT-level chart value, NOT under
        # `authentik:` block — that block is reserved for AUTHENTIK_*
        # env vars). Chart auto-mounts these ConfigMaps at
        # /blueprints/mounted/cm-<name>/ on both server and worker;
        # Authentik scans /blueprints/ recursively and applies any YAML
        # with blueprints.goauthentik.io/instantiate=true.
        #
        # Production mirrors develop's argocd + grafana RBAC scaffolding
        # — see clusters/production/platform/authentik/blueprints/.
        # Member lists are empty until operators enroll via Google-OIDC
        # on auth.nxua.dev; Terraform-managed argocd/grafana RBAC keep
        # wildcard-admin and Viewer defaults respectively so no lock-
        # out occurs in the interim. Production carries real workloads
        # — do NOT flip these defaults until at least two operators are
        # in argocd-admin (for 4-eyes break-glass) AND the relogin gate
        # proves the `groups` claim is reaching downstream services.
        blueprints:
          configMaps:
            - authentik-blueprint-argocd-rbac
            - authentik-blueprint-argocd-oidc
            - authentik-blueprint-grafana-rbac
            - authentik-blueprint-grafana-oidc
        authentik:
          error_reporting:
            enabled: false
          postgresql:
            host: nexora-authentik-production-rw.authentik.svc
            name: authentik
            user: authentik
          redis:
            host: nexora-cache.dragonfly.svc.cluster.local
        server:
          replicas: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: authentik
                        app.kubernetes.io/component: server
                    topologyKey: kubernetes.io/hostname
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - auth.nxua.dev
            tls:
              - secretName: authentik-tls
                hosts:
                  - auth.nxua.dev
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
        worker:
          replicas: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: authentik
                        app.kubernetes.io/component: worker
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
        postgresql:
          enabled: false   # provided by CloudNativePG (clusters/production/stateful/authentik/)
        redis:
          enabled: false   # provided by Dragonfly (apps/dragonfly-cache.yaml)
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
