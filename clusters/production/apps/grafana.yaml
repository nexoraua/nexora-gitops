apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 8.5.4
    helm:
      values: |
        replicas: 2
        # Stateless Grafana: dashboards are provisioned from ConfigMaps
        # (sidecar.dashboards, label grafana_dashboard=1, source-of-truth
        # in the grafana-dashboards Application), datasources are inlined
        # below, and authentication is OIDC against Authentik — there is
        # no per-instance state worth persisting. LINSTOR is RWO, so a
        # shared RWX volume across active/active replicas would have been
        # a silent footgun (only one replica can mount; the second stays
        # pending). When user-saved dashboards / annotations / alert
        # state become important, switch to an external Postgres backing
        # store rather than reintroducing a PVC.
        persistence:
          enabled: false
        podDisruptionBudget:
          minAvailable: 1
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: grafana
                topologyKey: kubernetes.io/hostname
        admin:
          existingSecret: grafana-admin
          userKey: admin-user
          passwordKey: admin-password
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - grafana.nxua.dev
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.nxua.dev
        extraSecretMounts:
          - name: oidc-credentials
            secretName: grafana-oidc
            mountPath: /etc/grafana/secrets
            readOnly: true
        grafana.ini:
          server:
            root_url: https://grafana.nxua.dev
          auth.generic_oauth:
            enabled: true
            name: Authentik
            allow_sign_up: true
            client_id: $__file{/etc/grafana/secrets/oidc-client-id}
            client_secret: $__file{/etc/grafana/secrets/oidc-client-secret}
            scopes: openid profile email groups
            auth_url: https://auth.nxua.dev/application/o/authorize/
            token_url: https://auth.nxua.dev/application/o/token/
            api_url: https://auth.nxua.dev/application/o/userinfo/
            # Production: Authentik emits a groups claim mapped to the
            # `grafana_role` attribute, so role_attribute_path resolves
            # by group membership rather than blanket Admin.
            role_attribute_path: "contains(groups[*], 'grafana-admin') && 'Admin' || contains(groups[*], 'grafana-editor') && 'Editor' || 'Viewer'"
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                type: prometheus
                isDefault: true
                url: http://vmselect-vm.monitoring.svc:8481/select/0/prometheus
                access: proxy
              - name: Loki
                type: loki
                url: http://loki-gateway.monitoring.svc
                access: proxy
              - name: Tempo
                type: tempo
                url: http://tempo-query-frontend.monitoring.svc:3100
                access: proxy
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
          datasources:
            enabled: false
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
