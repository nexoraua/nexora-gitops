# CloudNativePG cluster for business data (Identity, Wallet, Investments,
# Contracts, FOP, Audit, Notifications, Quartz).
# Production: 3 instances with synchronous replication across 3 distinct
# database nodes (stateful-1/2/3) + linstor-r3 (replicationFactor=3) — so
# data is replicated at both the DB and the storage layer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-business
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: data
  source:
    repoURL: https://github.com/nexoraua/nexora-gitops.git
    targetRevision: main
    path: clusters/production/stateful/postgresql
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql
  syncPolicy:
    automated:
      prune: false   # never auto-prune Postgres
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
