# Loki — log aggregation backend (production: SimpleScalable on Hetzner
# Object Storage). Per-component replicas: read 3, write 3, backend 3,
# gateway 2. replication_factor=3 keeps write quorum (2/3) across a
# single-node loss — required for HA on the write path.
# Chunks + ruler in nexora-production-loki bucket (FSN1, 90 d retention
# via Loki's own compactor).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.20.0
    helm:
      values: |
        deploymentMode: SimpleScalable
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 3
          storage:
            type: s3
            s3:
              endpoint: fsn1.your-objectstorage.com
              region: fsn1
              s3ForcePathStyle: true
              insecure: false
            bucketNames:
              chunks: nexora-production-loki
              ruler: nexora-production-loki
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          pattern_ingester:
            enabled: false
          ruler:
            enable_api: true
          # Compactor handles retention via storage-side delete.
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 2160h    # 90 d
          compactor:
            retention_enabled: true
            delete_request_store: s3
        # Credentials for the S3 backend come from the loki-s3 Secret
        # (ESO -> kv/nexora/production/object-storage/loki).
        loki.storage.s3.secret_access_key: ""
        loki.storage.s3.access_key_id: ""
        # The chart picks AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env
        # vars out of any Secret mounted via extraEnvFrom.
        read:
          replicas: 3
          persistence:
            storageClass: linstor-r1
            size: 10Gi
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: read
                  topologyKey: kubernetes.io/hostname
          extraEnvFrom:
            - secretRef:
                name: loki-s3
        write:
          replicas: 3
          persistence:
            storageClass: linstor-r1
            size: 20Gi
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: write
                  topologyKey: kubernetes.io/hostname
          extraEnvFrom:
            - secretRef:
                name: loki-s3
        backend:
          replicas: 3
          persistence:
            storageClass: linstor-r1
            size: 10Gi
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: backend
                  topologyKey: kubernetes.io/hostname
          extraEnvFrom:
            - secretRef:
                name: loki-s3
        gateway:
          enabled: true
          replicas: 2
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: gateway
                  topologyKey: kubernetes.io/hostname
        chunksCache:
          enabled: true
          replicas: 2
        resultsCache:
          enabled: true
          replicas: 2
        # SingleBinary explicitly disabled.
        singleBinary:
          replicas: 0
        test:
          enabled: false
        ingester:
          replicas: 0
        distributor:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        indexGateway:
          replicas: 0
        compactor:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
