# Production HPA for nexora-api.
#
# S14 Wave 1.8 — manual replicas=2 is enough until launch traffic
# stabilises, but a launch spike (mobile app onboarding wave, marketing
# campaign) shouldn't require kubectl scale at 02:00 UTC. The HPA scales
# on average CPU utilisation across pods.
#
# Min=2 holds the PDB invariant; max=8 caps cost. Utilisation target 70%
# leaves headroom for the four-eyes parking spike when an approver
# logs in and pulls /pending-actions.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexora-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
