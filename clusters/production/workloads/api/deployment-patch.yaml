apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: NEXORA_DEPLOY_ENV
              value: production
            - name: Vault__DefaultKeyName
              value: nexora-pii-production
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              # CPU limit added in S14 Wave 1.8 — kubelet enforces a
              # hard cap so a noisy neighbour can't starve the API.
              # Burstability is sacrificed for QoS predictability,
              # which is the right trade-off for a regulated workload.
              cpu: "2"
              memory: 1Gi
