apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexora-api
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.nexora.in.ua`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      services:
        - name: nexora-api
          port: 80
  tls:
    secretName: nexora-api-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nexora-api-tls
spec:
  secretName: nexora-api-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: app.nexora.in.ua
  dnsNames:
    - app.nexora.in.ua
  duration: 2160h
  renewBefore: 360h
