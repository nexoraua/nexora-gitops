apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-admin
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: admin
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: NEXORA_DEPLOY_ENV
              value: production
            - name: Vault__DefaultKeyName
              value: nexora-pii-production
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              # CPU limit added in S14 Wave 1.8 — keeps the Blazor
              # circuit pool deterministic under load. Admin is
              # bursty (queue refreshes) but never long-running, so
              # a 1-core ceiling is enough.
              cpu: "1"
              memory: 512Mi
