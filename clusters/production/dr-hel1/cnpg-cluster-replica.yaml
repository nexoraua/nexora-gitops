# CNPG streaming-replica bootstrap for HEL1 cold standby.
# replicas: 0 by default — no Application targets this directory, so
# Argo CD does not reconcile this manifest at day-1.
#
# ACTIVATION:
#   - Set spec.instances to 3.
#   - Provision the HEL1 cluster.
#   - Seed cnpg-superuser + cnpg-backup-s3 + aws-dr-replicator Secrets
#     in the HEL1 cluster's external-secrets (ESO -> the same Vault).
#   - The bootstrap.pg_basebackup.source points at the FSN1 primary;
#     CNPG streams the base backup + WAL from there over the cross-
#     region tailnet route. PG_HOST is the tailnet hostname of the
#     primary cluster's RW Service (exposed by the dr-tailscale-router
#     on the FSN1 side).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nexora-business-production-hel1
  namespace: postgresql
spec:
  instances: 0   # COLD: flip to 3 on activation
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-superuser
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
  storage:
    storageClass: linstor-r3
    size: 50Gi
  walStorage:
    storageClass: linstor-r3
    size: 15Gi
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      memory: 8Gi
  bootstrap:
    pg_basebackup:
      source: nexora-business-production
  # Replica streams from the FSN1 primary. After failover, set
  # replica.enabled=false to promote.
  replica:
    enabled: true
    source: nexora-business-production
  externalClusters:
    - name: nexora-business-production
      connectionParameters:
        # Resolved via tailnet — the FSN1 primary exports its RW Service
        # as a tailnet hostname via the dr-tailscale-router on that side.
        host: nexora-business-production-rw.fsn1.tailnet.nxua.ts.net
        user: streaming_replica
        sslmode: require
      password:
        name: cnpg-replication
        key: password
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      nodepool: database
    tolerations:
      - key: nodepool
        operator: Equal
        value: database
        effect: NoSchedule
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://nexora-cnpg-backups-production-hel1/"
      endpointURL: "https://hel1.your-objectstorage.com"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        jobs: 4
