# Vault HA — HEL1 DR cold standby.
# Helm release ha.replicas: 3 stays in the chart values for the day of
# activation, but no parent Application targets clusters/production/dr-hel1/
# day-1, so the effective replica count is 0.
#
# AWS KMS auto-unseal points at the SAME single global Transit key
# alias/nexora-transit-production (eu-central-1) used by FSN1 — DR
# regions intentionally reuse the FSN1 unseal key so every Vault
# cluster in the production family shares the same root of trust.
# Initial Shamir 5/3 unseal is NOT re-run per region — the migration
# runbook produces a Vault that auto-unseals from the same KMS key
# on every restart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-hel1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: apps
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      values: |
        global:
          tlsDisable: true
        server:
          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: true
              setNodeId: true
              config: |
                ui = true
                listener "tcp" {
                  tls_disable = 1
                  address     = "[::]:8200"
                  cluster_address = "[::]:8201"
                }
                storage "raft" {
                  path = "/vault/data"
                  retry_join {
                    leader_api_addr = "http://vault-0.vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://vault-1.vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://vault-2.vault-internal:8200"
                  }
                }
                # Same global KMS key as FSN1 by design.
                seal "awskms" {
                  region     = "eu-central-1"
                  kms_key_id = "alias/nexora-transit-production"
                }
                service_registration "kubernetes" {}
          dataStorage:
            enabled: true
            size: 20Gi
            storageClass: hcloud-volumes
          affinity: |
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: vault
                      app.kubernetes.io/instance: vault
                      component: server
                  topologyKey: kubernetes.io/hostname
          tolerations: |
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
            - key: nodepool
              operator: Equal
              value: database
              effect: NoSchedule
          serviceAccount:
            create: true
            name: vault
            annotations:
              # REPLACE WITH REGION-LOCAL TRUST POLICY ARN AT ACTIVATION.
              # The FSN1 IAM role nexora-vault-transit-unseal-production
              # trusts only the FSN1 OIDC issuer URL — pointing HEL1 at
              # it produces AssumeRoleWithWebIdentity failures during
              # vault unseal (`AccessDenied: Not authorized to perform
              # sts:AssumeRoleWithWebIdentity`). A dedicated HEL1 role
              # (e.g. nexora-vault-transit-unseal-production-hel1) must
              # be created in Terraform with the HEL1 cluster's OIDC
              # issuer added to its trust policy, then this ARN swapped
              # in before Phase 5 of the DR activation runbook.
              eks.amazonaws.com/role-arn: arn:aws:iam::727990091861:role/REPLACE-AT-ACTIVATION-nexora-vault-transit-unseal-production-hel1
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 1Gi
        ui:
          enabled: true
          serviceType: ClusterIP
        injector:
          enabled: false
  destination:
    name: production-hel1
    namespace: vault-system
  syncPolicy:
    automated:
      prune: false  # never auto-prune Vault — manual approval only
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
