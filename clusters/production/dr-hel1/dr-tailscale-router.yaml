# Tailscale subnet router for the HEL1 cold standby cluster.
# replicas: 0 by default — activated on DR flip.
#
# Advertises the HEL1 cluster CIDR (10.61.0.0/16) into the nxua tailnet
# so the FSN1 primary CNPG cluster can reach the HEL1 streaming-replica
# Service over the tailnet without going through the public internet.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
---
apiVersion: v1
kind: Service
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
spec:
  clusterIP: None
  selector:
    app: tailscale-subnet-router
  ports:
    - name: placeholder
      port: 9999
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
  labels:
    app: tailscale-subnet-router
spec:
  replicas: 0   # COLD: flip to 2 on activation
  serviceName: tailscale-subnet-router
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: tailscale-subnet-router
  template:
    metadata:
      labels:
        app: tailscale-subnet-router
    spec:
      serviceAccountName: tailscale-subnet-router
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nodepool
                    operator: In
                    values: [system, workers]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: tailscale-subnet-router
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: nodepool
          operator: Equal
          value: system
          effect: NoSchedule
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.96.5
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TS_KUBE_SECRET
              value: "$(POD_NAME)-state"
            - name: TS_USERSPACE
              value: "true"
            - name: TS_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: auth-key
            - name: TS_ROUTES
              value: "10.61.0.0/16"
            - name: TS_HOSTNAME
              value: "$(POD_NAME)"
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:k8s,tag:nexora-production-hel1 --accept-dns=false"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
