# ClusterSecretStore pointing at the in-cluster Vault — HEL1 DR.
# Same shape as FSN1 (vault.vault-system.svc:8200, KV v2 at `kv/`).
# All ExternalSecret manifests in this region key off
# kv/nexora/production-hel1/* under the same KV mount.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: http://vault.vault-system.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
