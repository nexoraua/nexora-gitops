# RabbitMQ PDB — HEL1 DR cold standby. Verbatim copy.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rabbitmq-pdb
  namespace: rabbitmq
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexora-rabbitmq
      app.kubernetes.io/component: rabbitmq
