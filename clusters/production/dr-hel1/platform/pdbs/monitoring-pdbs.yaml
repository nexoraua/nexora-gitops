# Monitoring stack PDBs — HEL1 DR cold standby. Verbatim copy.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-read-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: read
---
apiVersion: policy/v1
