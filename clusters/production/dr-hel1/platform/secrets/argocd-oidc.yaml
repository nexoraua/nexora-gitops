# Argo CD OIDC client — HEL1 DR cold standby.
# Only applies if the DR cluster runs its own Argo CD instance; otherwise
# the central Argo CD in FSN1 reconciles this region via the
# production-hel1 destination and these credentials are unused.
# Redirect URI: https://argocd-hel1.nxua.dev/auth/callback.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    template:
      metadata: {}
  data:
    - secretKey: oidc.authentik.clientID
      remoteRef:
        key: nexora/production-hel1/oidc/argocd
        property: client_id
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: nexora/production-hel1/oidc/argocd
        property: client_secret
