# Tailscale auth key for the HEL1 subnet router.
# Regional Vault path; the auth key is tagged for
# tag:k8s,tag:nexora-production-hel1 so the tailnet ACL can route this
# region's CIDR (10.62.0.0/16) independently of FSN1 / NBG1.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: tailscale-auth
    creationPolicy: Owner
  data:
    - secretKey: auth-key
      remoteRef:
        key: nexora/production-hel1/tailscale
        property: auth-key
