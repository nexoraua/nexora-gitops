# Hetzner Object Storage credentials for CNPG (regional buckets in HEL1).
# Vault KV path: kv/nexora/production-hel1/cnpg-backup-s3 — distinct from
# FSN1's bucket so a credential leak in one region cannot read the other.
# Buckets: nexora-cnpg-backups-production-hel1 (business) and
# nexora-cnpg-backups-authentik-production-hel1 (authentik).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/production-hel1/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production-hel1/cnpg/backup-s3
        property: secret-access-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: nexora/production-hel1/cnpg/backup-s3
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: nexora/production-hel1/cnpg/backup-s3
        property: secret-access-key
