# Grafana OIDC client — HEL1 DR cold standby.
# Authentik provider lives at auth-hel1.nxua.dev once this region is
# active; the OIDC client_id / secret are seeded under the regional
# Vault path kv/nexora/production-hel1/oidc/grafana.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-id
      remoteRef:
        key: nexora/production-hel1/oidc/grafana
        property: client_id
    - secretKey: oidc-client-secret
      remoteRef:
        key: nexora/production-hel1/oidc/grafana
        property: client_secret
