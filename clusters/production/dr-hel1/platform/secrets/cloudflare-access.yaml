# Cloudflare Access — HEL1 DR cold standby.
# JWT AUD tags are scoped to the regional hostnames *-hel1.nxua.dev
# (auth-hel1 / grafana-hel1 / vault-hel1 / argocd-hel1 / hubble-hel1 /
# rabbitmq-hel1 / vmui-hel1). Cloudflare application bindings live in
# nexora-infra/modules/cloudflare/access.tf.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-access
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cloudflare-access
    creationPolicy: Owner
  data:
    - secretKey: CF_ACCESS_AUD
      remoteRef:
        key: nexora/production-hel1/cloudflare-access
        property: aud
    - secretKey: CF_ACCESS_TEAM_DOMAIN
      remoteRef:
        key: nexora/production-hel1/cloudflare-access
        property: team-domain
