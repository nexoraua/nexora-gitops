# CNPG superuser credentials — HEL1 DR cold standby.
# Vault KV paths retargeted to the regional prefix
# kv/nexora/production-hel1/cnpg-superuser so the credential lifecycle
# for this region's CNPG replica is independent of FSN1's primary.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-superuser
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-hel1/cnpg/superuser
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-hel1/cnpg/superuser
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-authentik-superuser
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-authentik-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-hel1/cnpg/authentik-superuser
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-hel1/cnpg/authentik-superuser
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-postgres-credentials
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: authentik-postgres-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-hel1/authentik/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-hel1/authentik/postgres
        property: password
---
# Streaming-replication credentials. The HEL1 CNPG cluster uses these to
# authenticate as user `streaming_replica` against the FSN1 primary's RW
# Service (over the tailnet). Username + password are SHARED across
# regions — the password lives in kv/nexora/production-hel1/cnpg-replication
# but must match the secret seeded in FSN1's
# kv/nexora/production/cnpg/replication; rotation happens in lockstep on
# both regions.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-replication
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-replication
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-hel1/cnpg/replication
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-hel1/cnpg/replication
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-replication
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: cnpg-replication
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: nexora/production-hel1/cnpg/replication
        property: username
    - secretKey: password
      remoteRef:
        key: nexora/production-hel1/cnpg/replication
        property: password
