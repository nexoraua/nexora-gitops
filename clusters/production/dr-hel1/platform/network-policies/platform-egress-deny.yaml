# Egress lockdown for platform namespaces — HEL1 DR cold standby.
# Mirrors clusters/production/platform/network-policies/platform-egress-deny.yaml
# with the Hetzner Object Storage FQDN flipped to the regional endpoint
# (hel1.your-objectstorage.com). AWS KMS / Let's Encrypt / Cloudflare /
# Slack / PagerDuty endpoints are global — same as FSN1.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-allowlist
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
      ports:
        - port: 8200
          protocol: TCP
    - to:
        - podSelector: {}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: external-secrets
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allowlist
  namespace: cert-manager
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cert-manager
    - toFQDNs:
        - matchName: "acme-v02.api.letsencrypt.org"
        - matchName: "acme-staging-v02.api.letsencrypt.org"
        - matchName: "api.cloudflare.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchPattern: "*.ns.cloudflare.com"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# authentik: Postgres (intra-ns), Dragonfly, Google Workspace OIDC,
# and Hetzner Object Storage (regional: hel1) for co-located CNPG backups.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allowlist
  namespace: authentik
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: authentik
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    - toFQDNs:
        - matchName: "accounts.google.com"
        - matchName: "oauth2.googleapis.com"
        - matchName: "openidconnect.googleapis.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchName: "hel1.your-objectstorage.com"
        - matchPattern: "*.hel1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# monitoring: Hetzner Object Storage (regional: hel1) for Loki chunks +
# Tempo blocks, plus alert delivery (Slack + PagerDuty) from
# vmalertmanager.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allowlist
  namespace: monitoring
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    - toEndpoints: []   # intra-cluster scraping cluster-wide
    - toFQDNs:
        - matchName: "hel1.your-objectstorage.com"
        - matchPattern: "*.hel1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchName: "hooks.slack.com"
        - matchName: "events.pagerduty.com"
        - matchName: "events.eu.pagerduty.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# vault-system: kube-apiserver, DNS, AWS KMS for transit auto-unseal
# (same single global key alias/nexora-transit-production in eu-central-1
# — DR regions reuse the FSN1 unseal key on purpose so all Vault clusters
# share the same root of trust), and Traefik websecure for OIDC self-call.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allowlist
  namespace: vault-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
    - toFQDNs:
        - matchName: "kms.eu-central-1.amazonaws.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
