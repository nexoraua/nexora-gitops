# Operator-namespace ingress allowlist — HEL1 DR cold standby.
# Verbatim copy of clusters/production/platform/network-policies/operator-ingress-deny.yaml.
# Selectors target namespace labels (kubernetes.io/metadata.name) which
# are identical across all production regions.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allowlist
  namespace: cnpg-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
