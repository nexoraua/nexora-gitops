# Baseline egress allows for the stateful namespaces — HEL1 DR cold standby.
#
# Three deltas vs FSN1 source manifest:
#   1. Hetzner Object Storage FQDN points at the regional endpoint
#      hel1.your-objectstorage.com (regional CNPG backup bucket
#      nexora-cnpg-backups-production-hel1 / authentik-hel1).
#   2. CNPG instances need egress to the FSN1 tailnet hostname for
#      pg_basebackup + streaming replication from the primary. The L3
#      route is provided by dr-tailscale-router.yaml; this policy
#      authorises the L4 connection to the FSN1 cluster CIDR
#      (10.60.0.0/16) on the Postgres port.
#   3. The DR-sync rclone CronJob policy from FSN1 is INTENTIONALLY
#      omitted — the AWS S3 Object Lock WORM sync runs ONLY in the
#      active FSN1 region. Adding a CronJob here would race on Object
#      Lock retention extension.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: postgresql
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-apiserver
  namespace: postgresql
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: dragonfly
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
