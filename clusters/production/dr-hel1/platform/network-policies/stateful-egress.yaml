---
# CNPG instance peer + monitoring + app + cross-region streaming-replica
# bootstrap egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-peer
  namespace: postgresql
spec:
  podSelector:
    matchLabels:
      cnpg.io/podRole: instance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9187
          protocol: TCP
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
---
# Cross-region streaming replication: HEL1 replica reaches the FSN1
# primary RW Service via the tailnet hostname
# nexora-business-production-rw.fsn1.tailnet.nxua.ts.net. The Tailscale
# subnet router in this region (dr-tailscale-router.yaml) advertises
# 10.62.0.0/16; the FSN1 side advertises 10.60.0.0/16. The L4 connection
# resolves to a 10.60/16 address (FSN1 cluster CIDR), so the CIDR-based
# Cilium policy below authorises egress to that range over PG (5432) and
# tailnet DNS (53). pg_basebackup + WAL streaming run over this path.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-fsn1-streaming
  namespace: postgresql
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/podRole: instance
  egress:
    - toCIDR:
        - "10.60.0.0/16"
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-peer
  namespace: rabbitmq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nexora-rabbitmq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nexora-rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 4369
          protocol: TCP
        - port: 25672
          protocol: TCP
        - port: 15672
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rabbitmq-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 15672
          protocol: TCP
        - port: 15692
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexora-admin
      ports:
        - port: 5672
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nexora-rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 4369
          protocol: TCP
        - port: 25672
          protocol: TCP
        - port: 15672
          protocol: TCP
---
# CNPG instance + restore-Job egress to regional Hetzner Object Storage
# (HEL1). Bucket: nexora-cnpg-backups-production-hel1.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-object-storage
  namespace: postgresql
spec:
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "hel1.your-objectstorage.com"
        - matchPattern: "*.hel1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Same egress for the authentik-co-located CNPG cluster.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-object-storage
  namespace: authentik
spec:
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "hel1.your-objectstorage.com"
        - matchPattern: "*.hel1.your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Cross-region streaming replication for the authentik CNPG replica —
# same pattern as the business cluster: reach the FSN1 RW Service via
# the tailnet hostname, which resolves into the FSN1 cluster CIDR.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-egress-fsn1-streaming
  namespace: authentik
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/podRole: instance
  egress:
    - toCIDR:
        - "10.60.0.0/16"
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
