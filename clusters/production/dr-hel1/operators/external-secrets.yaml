# External Secrets Operator — HEL1 DR cold standby.
# Required so every ExternalSecret in this region reconciles against
# the regional Vault KV path prefix kv/nexora/production-hel1/*.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-hel1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7
    helm:
      values: |
        installCRDs: true
        replicaCount: 0
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        nodeSelector:
          nodepool: system
        tolerations:
          - key: nodepool
            operator: Equal
            value: system
            effect: NoSchedule
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: external-secrets
                topologyKey: kubernetes.io/hostname
        webhook:
          port: 9443
          replicaCount: 0
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          nodeSelector:
            nodepool: system
          tolerations:
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: external-secrets-webhook
                  topologyKey: kubernetes.io/hostname
        certController:
          replicaCount: 0
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          nodeSelector:
            nodepool: system
          tolerations:
            - key: nodepool
              operator: Equal
              value: system
              effect: NoSchedule
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
  destination:
    name: production-hel1
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
