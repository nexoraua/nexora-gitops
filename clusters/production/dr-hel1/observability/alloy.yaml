# Grafana Alloy — HEL1 DR cold standby.
# DaemonSet + StatefulSet OTLP gateway pointing at the regional
# alloy-config ConfigMap (clusters/production/dr-hel1/platform/alloy/).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alloy-hel1
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - role: daemonset
            controller: daemonset
            replicas: "1"
            syncWave: "1"
          - role: otlp-gateway
            controller: statefulset
            replicas: "2"
            syncWave: "1"
  template:
    metadata:
      name: 'alloy-{{role}}-hel1'
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
    spec:
      project: observability
      sources:
        - repoURL: https://grafana.github.io/helm-charts
          chart: alloy
          targetRevision: 0.9.2
          helm:
            releaseName: 'alloy-{{role}}'
            values: |
              controller:
                type: {{controller}}
                replicas: {{replicas}}
                tolerations:
                  - operator: Exists
              alloy:
                mounts:
                  varlog: true
                  dockercontainers: true
                configMap:
                  create: false
                  name: alloy-config
                extraPorts:
                  - name: otlp-grpc
                    port: 4317
                    targetPort: 4317
                    protocol: TCP
                  - name: otlp-http
                    port: 4318
                    targetPort: 4318
                    protocol: TCP
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
              crds:
                create: false
        - repoURL: https://github.com/nexoraua/nexora-gitops.git
          targetRevision: main
          path: clusters/production/dr-hel1/platform/alloy
      destination:
        name: production-hel1
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
